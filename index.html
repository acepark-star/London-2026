Object.assign(NOTION_CONTENT, {"nottinghill":[["h2","AI 여행 가이드"],["h3","1️⃣ 기본 정보"],["li","장소명: 노팅힐 (Notting Hill)"],["li","위치: 런던 서부, 왕립 켄싱턴 첼시구(Royal Borough of Kensington and Chelsea)"],["li","가까운 지하철역: Notting Hill Gate역, Ladbroke Grove역"],["li","추천 방문 소요 시간: 1시간~반나절 (포토벨로 마켓까지 보면 3~4시간도 가능)"],["li","입장료: 무료 (동네 전체를 걸어 다니는 개념)"],["li","방문 참고 시간: 상점·카페는 보통 오전 9~10시 오픈, 포토벨로 마켓은 금·토요일이 가장 활기찬 날 (일요일은 대부분 휴무)"],["li","이런 분께 추천: 사진 좋아하는 분, 영화 '노팅힐' 팬, 골동품·빈티지 좋아하는 분, 감성 카페 투어 좋아하는 분"],["hr",""],["h3","2️⃣ 한 문장으로 이해하는 기본 소개"],["p","\"영화 속 파스텔톤 골목이 그대로 실제 사람들이 사는 동네인 곳\""],["p","노팅힐은 특정 건물 하나가 아니라 동네 전체가 관광지예요. 휴 그랜트·줄리아 로버츠 주연의 영화 '노팅힐' 덕분에 세계적으로 유명해졌지만, 사실 이 파스텔 색 집들과 골목은 영화보다 훨씬 오래된 역사를 가지고 있어요. 런던에서 \"그림 같은 동네 산책\"을 원한다면 여기가 최적입니다."],["hr",""],["h3","3️⃣ 역사와 이 장소만의 특징"],["p","노팅힐의 시작은 지금 모습과는 완전히 달랐어요. 19세기 초, 래드브로크(Ladbroke) 가문이 이 땅을 사들여서 개발을 시작했는데, 처음엔 벨그레이비어나 메이페어 같은 상류층 동네를 흉내 낸 고급 주택가로 기획된 곳이었어요. 건축가 토마스 알라손이 곡선형 도로와 공동 정원을 갖춘 세련된 설계를 했죠."],["p","그런데 2차 세계대전 이후 상황이 확 바뀌었어요. 큰 저택들이 여러 가구가 나눠 사는 셋방으로 쪼개지면서 동네가 점점 낙후됐고, 20세기 중반엔 슬럼가에 가까운 이미지였어요. 이 시기에 카리브해 지역에서 온 이민자들이 대거 정착하면서, 지금의 노팅힐 카니발(매년 8월 열리는 유럽 최대 거리 축제)의 뿌리가 만들어졌어요. 1970~80년대엔 저렴한 임대료 덕분에 예술가와 보헤미안 성향의 젊은이들이 몰려들면서 지금의 자유롭고 개성 있는 분위기가 자리 잡았습니다."],["p","한국으로 치면, 낙후된 골목이 예술가들 손을 거쳐 지금의 힙한 동네로 탈바꿈한 서울 이화동 벽화마을이나 문래동 창작촌과 비슷한 흐름이라고 보시면 이해가 빠르실 거예요. 다만 노팅힐은 그 이후 부동산 가치가 폭등해서 지금은 런던에서 가장 비싼 동네 중 하나가 됐다는 반전이 있죠."],["hr",""],["h3","4️⃣ 건축물(공간) 관람 포인트 설명"],["p","건물 양식은 대부분 19세기 중반 빅토리안·조지안 타운하우스예요. 특징은 흰색 스투코(회벽) 마감 위에 알록달록하게 칠해진 파사드입니다."],["p","🔍 여기서 꼭 봐야 할 포인트 TOP 3"],["li","엘진 크레센트(Elgin Crescent) — 부활절 달걀처럼 알록달록한 집들이 곡선 도로를 따라 늘어서 있어요. 서서 보면 정말 한 폭의 그림 같은 풍경입니다."],["li","첩스토우 빌라스(Chepstow Villas)의 핑크 하우스 — 야자수 한 그루가 앞에 서 있는 분홍색 집이 특히 유명해요. 옆에 파란 집이 붙어 있어서 색 대비가 예뻐요."],["li","랭커스터 로드(Lancaster Road) — 다른 곳들이 파스텔톤이라면, 여기는 원색 계열로 칠해진 집들이 모여 있어서 확실히 다른 느낌을 줘요."],["p","실제로 서서 보면, 회색빛 런던 도심을 걷다가 갑자기 이 골목에 들어서는 순간 색채가 확 달라지는 게 느껴져요. 실제 주민들이 사는 집이니 문 앞에서 사진 찍을 땐 조심스럽게 예의를 지켜주시는 게 좋아요."],["p","📸 사진 찍기 좋은 위치는 웨스트본 파크 로드(Westbourne Park Road)의 파란 대문 집이에요. 영화 속 남자주인공 집 대문으로 나온 곳이라, 팬이라면 꼭 들러야 할 스팟이에요."],["hr",""],["h3","5️⃣ 주요 작품 / 상징적인 요소 소개"],["p","노팅힐을 대표하는 상징물은 바로 \"포토벨로 로드(Portobello Road)\"예요. 노팅힐의 중심을 가로지르는 이 길이 동네 전체의 심장 역할을 합니다."],["p","원래는 18세기에 농산물을 실어 나르던 시골길(그린스 레인)이었는데, 1940년대부터 골동품과 잡화를 파는 상인들이 모여들면서 지금의 명성을 얻게 됐어요. 지금은 세계적으로 유명한 골동품 시장이자, 영화 '노팅힐'에서 남자주인공이 운영하던 여행 서점(더 트래블 북샵)의 실제 모델이 있던 거리이기도 해요."],["p","처음 오시는 분들은 \"노팅힐 = 예쁜 집들 + 포토벨로 시장\"이라는 두 축만 기억하시면 이 동네를 이해하는 데 충분합니다."],["hr",""],["h3","6️⃣ 알고 가면 여행이 더 재밌어지는 이야기"],["li","덜 붐비는 시간대: 이른 아침(오전 9시 전)이 가장 조용해요. 포토벨로 마켓은 토요일 오전 일찍 가면 골동품 상인들이 막 자리를 펴는 모습부터 볼 수 있어요."],["li","동선 팁: 노팅힐 게이트역에서 시작해서 포토벨로 로드를 따라 북쪽으로 걸어가면서 엘진 크레센트, 랭커스터 로드 쪽으로 살짝 빠지는 동선이 좋아요. 걷다 보면 자연스럽게 컬러풀한 골목들을 다 지나가게 돼요."],["li","사람들이 놓치기 쉬운 포인트: 다들 큰길가 집들만 보고 지나가시는데, 포토벨로 로드에서 살짝 벗어난 좁은 뮤즈(mews·마차 창고를 개조한 골목) 안쪽에 오히려 조용하고 예쁜 집들이 숨어 있어요. 러선 뮤즈(Lucerne Mews) 같은 곳은 허브 이름이 붙은 오두막들이 있어서 은근 재미있어요."],["li","주변 연계 코스: 도보로 10분이면 켄싱턴 가든과 만나고, 근처에 일렉트릭 시네마(1911년 개관, 런던에서 가장 오래된 영화관 중 하나)도 있어요. 오전엔 포토벨로 마켓, 오후엔 켄싱턴 가든 산책으로 하루 코스를 짜기 좋습니다."],["p","이걸 알고 보시면, 단순히 \"영화 촬영지\"가 아니라 \"이민자들의 애환과 예술가들의 자유로움이 뒤섞여 지금의 색채를 만들어낸 동네\"라는 시선으로 보이실 거예요."]],"portobello":[["h2","AI 여행 가이드"],["h3","1️⃣ 기본 정보"],["li","장소명: 포토벨로 로드 마켓 (Portobello Road Market)"],["li","위치: 런던 노팅힐, 포토벨로 로드 전역 (첩스토우 빌라스~골본 로드까지)"],["li","가까운 지하철역: Notting Hill Gate역, Ladbroke Grove역, Westbourne Park역"],["li","추천 방문 소요 시간: 1시간 30분~3시간"],["li","입장료: 무료 (물건 구경만 하는 건 자유, 구매하실 때만 비용 발생)"],["li","운영 시간: 매일 오전 8시~오후 7시 (일요일은 휴무). 다만 요일별로 파는 물건과 규모가 완전히 달라짐"],["li","이런 분께 추천: 골동품·빈티지 좋아하는 분, 사진 좋아하는 분, 로컬 시장 분위기 좋아하는 분, 흥정하는 걸 즐기는 분"],["hr",""],["h3","2️⃣ 한 문장으로 이해하는 기본 소개"],["p","\"150년 넘은 청과물 시골길이 지금은 세계 최대 골동품 시장이 된 곳\""],["p","포토벨로 마켓은 런던 시내 관광지 중에서도 요일마다 완전히 다른 얼굴을 보여주는 독특한 곳이에요. 같은 장소인데 화요일에 갔을 때랑 토요일에 갔을 때 경험이 아예 다르거든요. 런던에서 \"진짜 시장 다운 생동감\"을 느끼고 싶다면 이곳만큼 확실한 선택이 없습니다."],["hr",""],["h3","3️⃣ 역사와 이 장소만의 특징"],["p","포토벨로 로드는 원래 18세기엔 그린스 레인(Green's Lane)이라는 이름의 시골길이었어요. 근처에 있던 포토벨로 농장(Porto Bello Farm)에서 이름을 따왔는데, 당시엔 농작물을 실어 나르는 평범한 농로였죠. 19세기 들어 노팅힐 지역이 개발되면서 이 길에도 청과물을 파는 상인들이 자리를 잡기 시작했어요."],["p","진짜 변화는 1940년대에 시작됐어요. 이 무렵부터 골동품과 잡화를 파는 상인들이 하나둘 들어오면서, 원래 채소 파는 길이 점점 골동품 거리로 색깔이 바뀌기 시작한 거예요. 1930~40년대를 거치며 인기가 커졌고, 지금은 영국에서 가장 큰 골동품 시장으로 자리 잡았어요. 1,000명이 넘는 상인이 활동한다고 하니, 규모가 어느 정도인지 짐작이 가시죠."],["p","한국으로 치면, 원래 청과물 도매로 시작했다가 지금은 골동품·수공예 거리로 유명해진 서울 황학동 벼룩시장과 비슷한 흐름이라고 보시면 이해가 쉬우실 거예요. 다만 포토벨로는 그 규모와 국제적 인지도가 훨씬 크다는 점이 다르죠."],["hr",""],["h3","4️⃣ 건축물(공간) 관람 포인트 설명"],["p","여기는 하나의 건물이 아니라 약 1.5km 넘게 이어지는 길 전체가 시장이에요. 특징은 구간마다 파는 물건이 완전히 달라진다는 점이에요."],["p","🔍 여기서 꼭 봐야 할 포인트 TOP 3"],["li","첩스토우 빌라스~엘진 크레센트 구간 (골동품 구역) — 노팅힐 게이트역과 가장 가까운 구간으로, 오래된 시계·은제품·빈티지 소품들이 좌판 가득 펼쳐져요. 토요일에 가장 활기가 넘치는 구간입니다."],["li","중간 구간 (과일·채소·식료품 구역) — 월~수요일에 특히 활발한 곳이에요. 신선한 과일, 치즈, 빵을 파는 좌판들이 늘어서 있어서 현지인들의 일상 장보기 모습을 볼 수 있어요."],["li","골본 로드(Golborne Road) 방향 (빈티지·잡화 구역) — 조금 더 걸어가면 모로코·포르투갈 커뮤니티가 자리 잡은 골본 로드가 나와요. 여기는 빈티지 옷, 가구, 길거리 음식이 중심이라 분위기가 또 달라요."],["p","실제로 서서 보면, 걸어가는 몇백 미터 사이에 파는 물건이 계속 바뀌는 게 느껴져요. 색색깔의 좌판, 흥정하는 소리, 다양한 언어가 뒤섞여서 굉장히 생동감 있는 느낌을 줍니다."],["p","📸 사진 찍기 좋은 위치는 첩스토우 빌라스와 엘진 크레센트 사이 골동품 구역이에요. 파스텔톤 집들을 배경으로 알록달록한 좌판들이 함께 잡혀서 가장 \"포토벨로다운\" 사진이 나와요."],["hr",""],["h3","5️⃣ 주요 작품 / 상징적인 요소 소개"],["p","포토벨로 마켓을 대표하는 건 특정 물건이 아니라 **\"요일별로 완전히 달라지는 시장의 얼굴\"**이에요. 이게 이곳의 핵심 정체성입니다."],["p","월요일부터 수요일까지는 과일·채소·잡화 위주로 로컬 주민들을 위한 시장에 가깝고, 목요일은 오전만 짧게 운영돼요. 금요일부터 골동품과 빈티지 상품이 늘어나기 시작하고, 토요일이 되면 골동품 아케이드까지 전부 열리면서 그 주 최대 규모로 운영됩니다. 일요일은 거리 시장 자체가 열리지 않아요."],["p","또 하나 상징적인 요소는 영화 '노팅힐'과의 연결이에요. 영화 속 여러 장면이 이 거리에서 촬영됐고, 남자주인공이 운영하던 여행 서점의 모델이 된 곳도 바로 이 길이에요. 처음 오시는 분들은 \"요일 = 시장 성격, 그리고 영화 속 그 거리\"라는 두 가지만 기억하시면 이해가 쉬우실 거예요."],["hr",""],["h3","6️⃣ 알고 가면 여행이 더 재밌어지는 이야기"],["li","덜 붐비는 시간대: 평일 오전, 특히 화~목요일이 가장 여유로워요. 골동품을 진짜 제대로 보고 싶다면 금요일 오전도 좋은 선택이에요. 사람은 좀 있지만 토요일보다는 훨씬 여유롭거든요."],["li","동선 팁: 노팅힐 게이트역에서 시작해서 북쪽으로 골본 로드 방향으로 걸어가는 게 자연스러워요. 골동품 → 식료품 → 빈티지·잡화 순으로 흐름이 이어지거든요."],["li","사람들이 놓치기 쉬운 포인트: 다들 토요일에만 가야 한다고 생각하시는데, 사실 진짜 로컬 분위기를 느끼려면 평일에 가서 과일·채소 파는 구역을 구경하는 것도 매력이 있어요. 또 흥정은 이 시장에서 당연한 문화이니, 가격 그대로 다 지불하지 마시고 살짝 물어보시는 것도 재미예요."],["li","주변 연계 코스: 도보로 이어지는 노팅힐 컬러풀 하우스들, 그리고 조금 더 걸어가면 켄싱턴 가든까지 도보권이에요. 오전엔 시장, 오후엔 산책으로 하루를 짜기 좋습니다."],["p","이걸 알고 보시면, 단순히 \"기념품 사는 곳\"이 아니라 \"시골 농로가 세계적인 골동품 거리로 변신하며 요일마다 다른 표정을 갖게 된 살아있는 시장\"이라는 시선으로 보이실 거예요."]],"ralphlauren":[["h2","AI 여행 가이드"],["h3","1️⃣ 기본 정보"],["li","장소명: 랄프 로렌 플래그십 스토어 뉴 본드 스트리트 (Ralph Lauren Flagship Store New Bond Street)"],["li","위치: 1 New Bond Street, London W1S 3RL (메이페어 지역)"],["li","가까운 지하철역: Green Park역 (도보 약 6분)"],["li","추천 방문 소요 시간: 20~40분"],["li","입장료: 무료 (매장이니 구경만 하셔도 됩니다)"],["li","운영 시간: 월~수 10:00~18:00 / 목~토 10:00~19:00 / 일 12:00~18:00"],["li","이런 분께 추천: 인테리어·건축 좋아하는 분, 사진 좋아하는 분, 패션·브랜드 히스토리에 관심 있는 분, 쇼핑 겸 구경하고 싶은 분"],["hr",""],["h3","2️⃣ 한 문장으로 이해하는 기본 소개"],["p","\"1920년대 대형 호화 여객선에서 영감을 받은, 은행 건물을 통째로 개조한 아트 데코 매장\""],["p","메이페어 거리를 걷다 보면 다들 명품 쇼핑거리로만 생각하시는데, 이 랄프 로렌 매장은 그중에서도 건물 자체가 볼거리인 곳이에요. 단순히 옷을 파는 공간이 아니라, 옛 은행 건물을 고급스러운 라이프스타일 공간으로 재해석한 사례라서, 패션에 관심이 없어도 구경할 가치가 있는 곳입니다."],["hr",""],["h3","3️⃣ 역사와 이 장소만의 특징"],["p","이 건물은 원래 내셔널 웨스트민스터 은행(National Westminster Bank)이 있던 자리였어요. 은행 건물이었던 만큼 7층 높이의 웅장한 파사드를 가지고 있는데, 이게 지금 랄프 로렌 매장의 외관 그대로예요."],["p","랄프 로렌이 런던에 처음 진출한 건 1981년이었는데, 지금의 이 대형 플래그십 매장은 1999년에 문을 열었어요. 24,000평방피트(약 2,200㎡)에 달하는 이 넓은 공간을 채우기 위해 브랜드는 1920년대 대형 호화 여객선의 느낌과 영국 신사 클럽의 중후함을 결합한 콘셉트를 선택했어요. 그래서 마호가니 패널, 실제로 불이 켜지는 벽난로, 미술품과 사진 컬렉션이 곳곳에 자리해 있는 거예요."],["p","한국으로 치면, 옛 한국은행 본관 건물을 그대로 살려서 명품 브랜드 플래그십 매장으로 재탄생시킨 느낌이라고 보시면 이해가 빠르실 거예요. 은행 특유의 격식 있는 건축을 브랜드 정체성에 맞게 재해석했다는 점이 핵심이에요."],["hr",""],["h3","4️⃣ 건축물(공간) 관람 포인트 설명"],["p","건물 외관은 20세기 초 은행 건축 양식이고, 내부는 아트 데코 스타일로 재해석돼 있어요."],["p","🔍 여기서 꼭 봐야 할 포인트 TOP 3"],["li","1층 남성관 (Men's Polo & Purple Label) — 마호가니 나무 소재와 클럽하우스 느낌의 인테리어가 인상적이에요. 은행이었던 흔적인 높은 천장과 격식 있는 구조가 그대로 남아 있어요."],["li","3층 여성관 — 옅은 마호가니 색과 스웨이드, 캐시미어 소재가 어우러진 공간이에요. 남성관과는 톤이 완전히 달라서, 층마다 분위기가 바뀌는 게 재미있어요."],["li","매장 내 벽난로와 미술품들 — 실제 불이 켜지는 벽난로가 매장 곳곳에 있어요. 백화점이 아니라 \"누군가의 저택에 초대받은 느낌\"을 주려고 의도적으로 배치한 요소예요."],["p","실제로 서서 보면, 층마다 마치 저택의 다른 방에 들어온 듯한 느낌이 들어요. 옷을 안 사더라도 그냥 계단을 오르내리며 인테리어만 구경해도 눈이 즐거운 공간입니다."],["p","📸 사진 찍기 좋은 위치는 정문 앞이에요. 자주색 캐노피(marquee)가 걸린 정문과 7층 높이의 클래식한 파사드가 함께 프레임에 들어와서, 뉴욕 매장에서 보셨던 그 시그니처 느낌을 런던에서도 그대로 담을 수 있어요."],["hr",""],["h3","5️⃣ 주요 작품 / 상징적인 요소 소개"],["p","이 매장을 대표하는 건 특정 제품이 아니라 **\"랄프스 커피(Ralph's Coffee)\"**예요. 매장 안에 있는 이 카페는 뉴욕 폴로 바(Polo Bar)의 분위기를 런던으로 그대로 옮겨온 공간이에요."],["p","왜 중요하냐면, 이게 단순한 카페가 아니라 \"쇼핑하며 쉬어가는 라이프스타일 브랜드\"라는 랄프 로렌의 정체성을 보여주는 상징적인 장치이기 때문이에요. 매장을 층마다 옷 구경하면서 다니다가, 중간에 이 카페에서 커피 한 잔 하고 다시 둘러보는 흐름이 이 브랜드가 의도한 경험이에요. 처음 오시는 분들은 \"쇼핑몰이 아니라 저택에 초대받아 커피까지 대접받는 느낌\"으로 이해하시면 딱 맞습니다."],["hr",""],["h3","6️⃣ 알고 가면 여행이 더 재밌어지는 이야기"],["li","덜 붐비는 시간대: 평일 오전 오픈 직후(10시~11시대)가 가장 여유로워요. 주말 오후는 관광객들로 매장 안이 붐빌 수 있어요."],["li","동선 팁: 1층부터 차근차근 올라가면서 남성관 → 여성관 순으로 둘러보시고, 지하층(홈 컬렉션)도 놓치지 마세요. 침구, 조명, 가구 등 랄프 로렌 홈 라인을 볼 수 있는데, 옷 매장보다 인테리어 감성이 훨씬 잘 느껴져요."],["li","사람들이 놓치기 쉬운 포인트: 다들 옷만 보고 나가시는데, 이 건물이 원래 은행이었다는 걸 알고 보면 층고와 구조가 왜 이렇게 웅장한지 이해가 돼요. 또 매장 곳곳의 벽난로가 실제로 작동한다는 점도 많이들 모르세요."],["li","주변 연계 코스: 길 건너에 까르띠에가 있고, 도보 몇 분 거리에 프라다·구찌 등 명품 매장들이 이어져 있어요. 뉴 본드 스트리트~올드 본드 스트리트를 따라 걸으면 메이페어 명품 거리 투어가 자연스럽게 완성돼요."],["p","이걸 알고 보시면, 단순히 \"옷 파는 매장\"이 아니라 \"은행 건물의 격식을 그대로 살려 브랜드의 라이프스타일 철학으로 재해석한 공간\"이라는 시선으로 보이실 거예요."]],"fortnum":[["h2","AI 여행 가이드"],["h3","1️⃣ 기본 정보"],["li","장소명: 포트넘 앤 메이슨 (Fortnum & Mason)"],["li","위치: 181 Piccadilly, London W1A 1ER (세인트 제임스 지역)"],["li","가까운 지하철역: Green Park역 (도보 3분), Piccadilly Circus역"],["li","추천 방문 소요 시간: 40분~1시간 30분 (애프터눈 티까지 하면 2시간 이상)"],["li","입장료: 무료 (구경만 하는 것도 자유)"],["li","운영 시간: 월~토 10:00~20:00, 일 11:30~18:00 (매장 상황에 따라 변동 가능)"],["li","이런 분께 추천: 차·식료품 좋아하는 분, 영국 왕실 문화에 관심 있는 분, 사진 좋아하는 분, 기념품 쇼핑하고 싶은 분"],["hr",""],["h3","2️⃣ 한 문장으로 이해하는 기본 소개"],["p","\"1707년 왕실 시종이 촛농을 팔아 시작한 가게가, 300년 넘게 영국 왕실에 물건을 납품하는 최고급 식료품점이 된 곳\""],["p","피카딜리를 걷다 보면 다들 이 청록색 건물을 그냥 예쁜 상점으로만 지나치시는데, 사실 여기는 영국 역사와 왕실 문화가 그대로 압축된 공간이에요. 단순히 차와 잼을 파는 곳이 아니라, \"영국다움\"이 뭔지 가장 압축적으로 느낄 수 있는 곳이라 런던 여행에서 꼭 넣으셔야 할 스팟입니다."],["hr",""],["h3","3️⃣ 역사와 이 장소만의 특징"],["p","이야기는 1707년, 앤 여왕의 왕실에서 시종으로 일하던 윌리엄 포트넘(William Fortnum)에서 시작해요. 이 사람의 일이 매일 밤 왕실의 촛불을 새것으로 갈아주는 거였는데, 왕실은 다 태우지 않은 촛농도 매일 새것으로 바꿔야 했어요. 포트넘은 이 반쯤 남은 촛농을 몰래 되팔아서 부수입을 챙겼는데, 이게 의외로 짭짤했던 거예요. 여기에 자신감을 얻은 포트넘은 집주인이었던 휴 메이슨(Hugh Mason)을 설득해서 함께 식료품점을 차리게 됩니다. 그렇게 1707년, 두 사람의 이름을 딴 포트넘 앤 메이슨이 탄생했어요."],["p","포트넘의 왕실 인맥은 이후로도 계속 사업에 도움이 됐어요. 그의 손자 찰스 포트넘이 샬럿 왕비를 모시게 되면서 왕실과의 관계가 더 깊어졌고, 나폴레옹 전쟁 때는 영국군 장교들에게 건조 과일과 향신료를 납품했어요. 1738년엔 여행자들을 위한 휴대식으로 스카치 에그(삶은 계란을 소시지 고기로 감싸 튀긴 요리)를 처음 만들었다고 알려져 있는데, 지금도 영국 대표 음식 중 하나로 남아있죠."],["p","한국으로 치면, 궁중에 물건을 납품하던 상인이 그 인연을 바탕으로 지금까지 이어지는 노포 브랜드를 키워낸 셈이에요. 다만 포트넘 앤 메이슨은 그 규모가 300년 넘게 이어지며 세계적인 브랜드로 성장했다는 점이 다르죠."],["hr",""],["h3","4️⃣ 건축물(공간) 관람 포인트 설명"],["p","지금 우리가 보는 건물은 1926~1927년에 네오 조지안 양식으로 새로 지어진 거예요. 건물 색은 \"오 드 닐(Eau de Nil, 나일강의 물)\"이라는 청록색인데, 1840년대부터 포트넘 앤 메이슨을 상징하는 시그니처 컬러가 됐어요."],["p","🔍 여기서 꼭 봐야 할 포인트 TOP 3"],["li","정문 위의 대형 시계 — 1964년에 설치된 4톤짜리 시계예요. 매시 정각마다 문이 열리면서 1.2m 높이의 포트넘과 메이슨 인형이 나와 서로 인사를 나눠요. 종소리는 빅벤과 같은 주조소(화이트채플 벨 파운드리)에서 만든 종을 사용해요."],["li","1층 다이아몬드 주빌리 푸드홀(Food Hall) — 차, 잼, 비스킷, 초콜릿이 화려하게 진열된 공간이에요. 매장 전체에 깔린 진홍색 카펫이 걸음을 자연스럽게 느리게 만들어서, 여유롭게 구경하게 되는 게 특징이에요."],["li","4층 다이아몬드 주빌리 티 살롱 — 애프터눈 티를 즐길 수 있는 공간으로, 2012년 엘리자베스 2세 여왕이 직접 개관식에 참석했던 곳이에요."],["p","실제로 서서 보면, 화려하지만 과하지 않은 분위기가 느껴져요. 특히 정각에 시계 인형이 나오는 순간, 피카딜리 거리를 지나던 사람들이 다 같이 멈춰서 구경하는 모습을 볼 수 있어요."],["p","📸 사진 찍기 좋은 위치는 정문 맞은편 인도예요. 청록색 건물 전체와 시계, 그리고 정문 앞 장식까지 한 프레임에 담을 수 있어요. 크리스마스 시즌엔 쇼윈도 장식도 놓치지 마세요."],["hr",""],["h3","5️⃣ 주요 작품 / 상징적인 요소 소개"],["p","포트넘 앤 메이슨을 대표하는 건 특정 제품이 아니라 **\"로열 블렌드(Royal Blend) 티\"**예요. 1902년 에드워드 7세의 즉위를 기념해서 만든 차인데, 인도산 아삼과 스리랑카산 플라워리 페코를 섞은 블렌드예요."],["p","왜 중요하냐면, 이 차 하나가 포트넘 앤 메이슨이 300년 넘게 유지해온 \"왕실 납품업체(Royal Warrant)\"라는 정체성을 상징적으로 보여주기 때문이에요. 실제로 이 브랜드는 1898년 빅토리아 여왕 때 처음 왕실 인증을 받았고, 2024년에도 찰스 3세와 카밀라 왕비로부터 새 인증을 받았어요. 처음 오시는 분들은 \"여기서 파는 차 통에 왕실 문장이 새겨진 이유\"가 바로 이 역사 때문이라고 이해하시면 딱 맞습니다."],["hr",""],["h3","6️⃣ 알고 가면 여행이 더 재밌어지는 이야기"],["li","덜 붐비는 시간대: 평일 오전 오픈 직후(10~11시)가 가장 여유로워요. 애프터눈 티는 예약이 필수인 경우가 많아서, 미리 온라인으로 예약하고 가시는 걸 추천해요."],["li","동선 팁: 1층 푸드홀만 보고 나가지 마시고, 위층 홈웨어·선물 코너까지 둘러보세요. 특히 4층 티 살롱까지 올라가면서 계단이나 스파이럴 스테어케이스(최근 새로 만든 나선형 계단)도 구경할 만해요."],["li","사람들이 놓치기 쉬운 포인트: 다들 1층 식료품만 보고 나가시는데, 매시 정각에 정문 위 시계 인형이 나오는 걸 놓치는 분들이 많아요. 시간 맞춰서 정문 앞에서 잠깐 기다려보세요. 또 건물 옥상에 실제로 양봉장과 텃밭이 있다는 것도 재밌는 사실이에요."],["li","주변 연계 코스: 도보로 몇 분이면 리츠 호텔, 세인트 제임스 파크, 버킹엄 궁전까지 이어져요. 피카딜리 서커스에서 시작해서 포트넘 앤 메이슨 → 세인트 제임스 파크 산책으로 코스를 짜면 좋습니다."],["p","이걸 알고 보시면, 단순히 \"고급 식료품점\"이 아니라 \"촛농 되팔던 시종의 사업이 300년 넘게 왕실과 함께 성장한, 영국 그 자체를 담은 공간\"이라는 시선으로 보이실 거예요."]],"f1cards":[["h2","AI 여행 가이드"],["h3","1️⃣ 기본 정보"],["li","장소명: 파나틱스 콜렉터블스 (Fanatics Collectibles)"],["li","위치: 54 Regent Street, London (피카딜리 서커스 인근)"],["li","가까운 지하철역: Piccadilly Circus역 (도보 1~2분)"],["li","추천 방문 소요 시간: 30분~1시간"],["li","입장료: 무료 (구경만 하는 것도 자유, 카드 구매 시에만 비용 발생)"],["li","운영 시간: 매일 운영 (연중 7일, 정확한 마감 시간은 방문 전 매장 확인 권장)"],["li","이런 분께 추천: F1·스포츠 팬, 트레이딩 카드 수집가, 굿즈·기념품 좋아하는 분, 이색 매장 구경 좋아하는 분"],["hr",""],["h3","2️⃣ 한 문장으로 이해하는 기본 소개"],["p","\"세계 최초로 문을 연 파나틱스의 영구 플래그십 매장, F1과 축구 카드 팬들의 성지\""],["p","런던 여행 가이드북엔 아직 잘 안 나오는 곳이지만, 사실 이곳은 전 세계 카드 수집 커뮤니티에서 꽤 화제가 된 곳이에요. 미국 스포츠 굿즈 대기업 파나틱스가 처음으로 상시 운영하는 오프라인 매장을 연 게 바로 여기, 런던이거든요. F1이나 축구를 좋아하시는 분이라면 쇼핑 겸 팬심을 채우기 좋은 스팟입니다."],["hr",""],["h3","3️⃣ 역사와 이 장소만의 특징"],["p","이 매장은 2025년 4월 25일에 문을 열었어요. 아직 역사가 오래된 곳은 아니지만, 이게 왜 특별하냐면 파나틱스라는 회사가 세계 최초로 연 \"영구 플래그십 매장\"이기 때문이에요. 그동안은 팝업스토어 형태로만 운영했는데, 정식으로 상시 매장을 낸 첫 사례가 바로 리젠트 스트리트점이에요."],["p","개장 당일엔 7회 F1 월드 챔피언인 루이스 해밀턴이 직접 리본 커팅식에 참여했어요. 유럽에서 축구와 F1이 카드 수집 시장에서 가장 인기 있는 두 종목이다 보니, 이 매장도 그 두 분야를 중심으로 구성됐어요. 매장 규모는 약 803㎡(8,647평방피트)에 달하는데, 이 정도 규모의 카드 전문 매장은 유럽에서 흔치 않아요."],["p","한국으로 치면, 해외 유명 스포츠 굿즈 브랜드가 처음으로 아시아 상설 매장을 서울에 낸 것과 비슷한 상징성이라고 보시면 이해가 빠르실 거예요. 다만 여기는 \"세계 최초\"라는 타이틀이 붙어있다는 점이 다르죠."],["hr",""],["h3","4️⃣ 건축물(공간) 관람 포인트 설명"],["p","매장 자체는 오래된 건물이 아니라 현대적으로 새로 꾸민 리테일 공간이에요. 특징은 카드 수집이라는 취미를 \"체험형 공간\"으로 풀어낸 구성이에요."],["p","🔍 여기서 꼭 봐야 할 포인트 TOP 3"],["li","센트럴 링 디스플레이(Central Ring Display) — 매장 한가운데 가장 희귀하고 값비싼 카드들을 전시해둔 공간이에요. 위에는 대형 원형 스크린이 매달려 있어서, 매장에 들어서는 순간 시선이 자연스럽게 여기로 쏠려요."],["li","브레이커 스튜디오(Breaker Studio) — 실시간으로 카드 팩을 개봉하는 라이브 스트리밍 촬영 공간이에요. 유리 너머로 실제 방송 장면을 구경할 수 있어요."],["li","커스텀 카드 제작룸 — 손님이 원하는 사진으로 나만의 1점 한정 토프스(Topps) 카드를 만들 수 있는 공간이에요. 세계 최초로 도입된 서비스라고 해요."],["p","실제로 서서 보면, 일반적인 기념품 가게보다는 애플스토어 같은 체험형 매장 느낌이 강해요. 실제 카드를 개봉하는 라이브 방송 장면을 옆에서 구경하는 것만으로도 흥미로운 경험이에요."],["p","📸 사진 찍기 좋은 위치는 센트럴 링 디스플레이 앞이에요. 위쪽 원형 스크린과 희귀 카드 전시가 함께 프레임에 들어와서, 매장의 시그니처 공간을 담을 수 있어요."],["hr",""],["h3","5️⃣ 주요 작품 / 상징적인 요소 소개"],["p","이 매장을 대표하는 건 특정 상품이 아니라 \"F1 라이츠 아웃 75주년 에디션(F1 Lights Out 75th Anniversary Edition)\" 카드예요. 개장과 동시에 이 매장에서만 구매 가능하도록 발매된 한정판 프리미엄 카드 세트예요."],["p","왜 중요하냐면, 이게 이 매장이 단순히 카드를 파는 곳이 아니라 \"여기서만 구할 수 있는 특별한 무언가\"를 만들어내는 곳이라는 정체성을 보여주는 상징적인 상품이기 때문이에요. 축구 팬이라면 리오넬 메시·펠레 같은 선수들의 서명 굿즈도 함께 볼 수 있어요. 처음 오시는 분들은 \"여기는 스포츠 카드 팬들의 성지 같은 곳\"이라고만 이해하시면 충분합니다."],["hr",""],["h3","6️⃣ 알고 가면 여행이 더 재밌어지는 이야기"],["li","덜 붐비는 시간대: 평일 오전이 상대적으로 여유로워요. F1 경기 주간이나 신제품 발매일(Drop Day)엔 팬들이 몰려서 붐빌 수 있어요."],["li","동선 팁: 매장 뒤편에 PSA(카드 등급 감정 서비스) 부스가 따로 있어요. 카드를 직접 개봉(브레이킹)한 뒤 바로 감정 접수까지 한 자리에서 가능한 구조라, 관심 있으시면 뒤쪽까지 둘러보세요."],["li","사람들이 놓치기 쉬운 포인트: 다들 진열된 완제품 카드만 보고 나가시는데, 매월 열리는 트레이드 나이트(Trade Night)나 선수 사인회 같은 이벤트 일정을 미리 확인하고 가시면 운 좋게 유명 선수를 마주칠 수도 있어요. 실제로 개장식엔 루이스 해밀턴이 왔었거든요."],["li","주변 연계 코스: 리젠트 스트리트를 따라 걸으면 피카딜리 서커스, 소호, 리버티 백화점까지 도보권이에요. 쇼핑 겸 관광 코스에 자연스럽게 끼워 넣기 좋습니다."],["p","이걸 알고 보시면, 단순히 \"카드 파는 가게\"가 아니라 \"세계적인 스포츠 굿즈 기업이 처음으로 상설 매장을 연, 유럽 카드 수집 문화의 새로운 거점\"이라는 시선으로 보이실 거예요."]],"trafalgar":[["h2","AI 여행 가이드"],["h3","1️⃣ 기본 정보"],["li","장소명: 트라팔가 광장 (Trafalgar Square)"],["li","위치: 런던 웨스트민스터구, 시내 중심부"],["li","가까운 지하철역: Charing Cross역 (도보 1분), Embankment역, Leicester Square역"],["li","추천 방문 소요 시간: 20~40분 (내셔널 갤러리까지 보면 반나절)"],["li","입장료: 무료 (24시간 개방된 공공 광장)"],["li","운영 시간: 상시 개방 (분수는 대부분 매일 가동)"],["li","이런 분께 추천: 사진 좋아하는 분, 영국 역사에 관심 있는 분, 사람 구경·거리 공연 좋아하는 분, 미술관 좋아하는 분"],["hr",""],["h3","2️⃣ 한 문장으로 이해하는 기본 소개"],["p","\"한 해군 제독의 승리를 기리기 위해 만든 기둥 하나가, 지금은 런던 민주주의와 축제의 중심 무대가 된 곳\""],["p","트라팔가 광장은 단순한 관광지 사진 스팟이 아니에요. 런던에서 정치 집회, 새해 카운트다운, 각종 국가적 행사가 열리는 실질적인 \"런던의 광장\"이거든요. 관광객들에겐 사자상과 분수로 유명하지만, 현지인들에겐 지금도 살아있는 공공 공간이라는 점이 이곳을 특별하게 만듭니다."],["hr",""],["h3","3️⃣ 역사와 이 장소만의 특징"],["p","이 자리는 원래 14~17세기까지 왕실 마구간(King's Mews)이 있던 곳이었어요. 19세기 들어 조지 4세가 마구간을 지금의 버킹엄 궁전 자리로 옮기면서, 이 공간을 어떻게 쓸지 논의가 시작됐죠. 건축가 존 내시가 처음 광장 조성을 제안했고, 이후 국회의사당을 설계한 찰스 배리 경이 지금의 광장 형태를 완성했어요."],["p","광장의 이름과 중심 기념물은 1805년 트라팔가 해전에서 따왔어요. 넬슨 제독이 프랑스·스페인 연합 함대를 상대로 대승을 거뒀지만, 전투 중 프랑스군 저격병의 총에 맞아 전사했어요. 나라 전체가 그를 추모하는 분위기 속에서, 1838년 귀족과 의원들이 모여 기념비를 세우기로 결정했고, 공모전을 통해 윌리엄 레일튼의 설계안이 선정됩니다. 넬슨 기념 기둥은 1840~1843년에 세워졌고, 그 유명한 청동 사자상들은 그보다 훨씬 늦은 1867년에야 추가됐어요."],["p","한국으로 치면, 이순신 장군의 승전을 기리는 대형 기념물이 서울 도심 한복판 광장에 세워지고, 그 광장이 이후 시민 집회와 국가 행사의 중심지가 된 셈이에요. 광화문 광장과 비슷한 위치성을 가진 곳이라고 보시면 이해가 빠르실 거예요."],["hr",""],["h3","4️⃣ 건축물(공간) 관람 포인트 설명"],["p","광장의 중심은 코린트 양식의 화강암 기둥, 넬슨 기념비예요. 전체 높이가 약 52m에 달해서 광장 어디서든 눈에 들어와요."],["p","🔍 여기서 꼭 봐야 할 포인트 TOP 3"],["li","넬슨 기념 기둥 위의 동상 — 넬슨 제독이 남쪽, 즉 해군본부 건물과 트라팔가 해전이 벌어진 스페인 방향을 바라보고 서 있어요. 오른팔 소매가 안으로 접혀 있는데, 이는 전투에서 잃은 팔을 나타낸 디테일이에요."],["li","네 마리의 청동 사자상 — 화가였던 에드윈 랜시어가 처음으로 조각에 도전해서 만든 작품이에요. 실제 죽은 사자를 모델로 삼았는데, 부패가 빠르게 진행되는 바람에 발 부분은 자기 개의 발을 참고했다는 재미있는 뒷이야기가 있어요."],["li","네 번째 좌대(Fourth Plinth) — 광장 북서쪽 모서리 좌대인데, 원래 동상을 놓을 계획이었지만 예산 부족으로 오랫동안 비어있었어요. 지금은 현대 미술가들이 번갈아 작품을 전시하는 자리로 쓰여요."],["p","실제로 서서 보면, 사자상들의 크기가 생각보다 훨씬 커요. 런던 택시 한 대만큼 길다고 하니 실제로 보면 다들 놀라시더라고요. 사람들이 사자 위에 올라가 사진 찍는 게 오랜 전통처럼 자리 잡았어요."],["p","📸 사진 찍기 좋은 위치는 광장 남쪽, 넬슨 기둥과 사자상을 정면으로 볼 수 있는 자리예요. 이른 아침이나 해질 무렵에 가면 사람도 적고 조명도 예쁘게 들어와요."],["hr",""],["h3","5️⃣ 주요 작품 / 상징적인 요소 소개"],["p","트라팔가 광장을 대표하는 요소는 바로 **\"네 마리의 청동 사자상\"**이에요. 넬슨 기둥 자체보다 오히려 이 사자들이 더 사랑받는 상징물이 됐어요."],["p","왜 중요하냐면, 이 사자들이 단순한 장식이 아니라 넬슨의 용맹함과 영국의 힘을 상징하도록 의도적으로 배치됐기 때문이에요. 원래는 입을 벌리고 포효하는 모습으로 설계될 뻔했는데, 빅토리아 여왕이 \"너무 놀라울 것 같다\"며 반대해서 지금처럼 얌전히 엎드린 자세로 바뀌었다고 해요. 처음 오시는 분들은 \"왜 사자가 있지?\"라는 질문에 \"용기와 수호를 상징한다\"는 답만 기억하시면 충분합니다."],["hr",""],["h3","6️⃣ 알고 가면 여행이 더 재밌어지는 이야기"],["li","덜 붐비는 시간대: 오전 9시 이전이 가장 조용해요. 낮 시간대는 관광객과 거리 공연자들로 붐빌 수 있어요."],["li","동선 팁: 광장 북쪽에 있는 내셔널 갤러리를 함께 묶어서 보시는 걸 추천해요. 무료 입장인데다 광장과 바로 붙어 있어서 동선이 자연스러워요."],["li","사람들이 놓치기 쉬운 포인트: 다들 사자상만 보고 넬슨 기둥 꼭대기는 잘 안 보시는데, 망원경 없이도 자세히 보면 넬슨의 소매가 접혀 있는 디테일이 보여요. 또 재미있는 전설로, \"빅벤이 13번 울리면 이 사자들이 깨어난다\"는 이야기가 런던에 전해지고 있어요. 그리고 광장 남동쪽 모서리에 있는 작은 파란색 상자는 사실 \"런던에서 가장 작은 경찰서\"로 알려진 구조물이에요."],["li","주변 연계 코스: 도보로 몇 분이면 더 몰(The Mall)을 따라 버킹엄 궁전까지 이어지고, 반대편으로는 웨스트민스터, 국회의사당, 빅벤까지 도보권이에요. 트라팔가 광장을 기준으로 런던 주요 랜드마크들을 하루 코스로 엮기 좋습니다."],["p","이걸 알고 보시면, 단순히 \"사자상 있는 광장\"이 아니라 \"한 제독의 희생을 기리며 세워졌다가, 지금은 런던 시민들의 목소리가 모이는 광장이 된 곳\"이라는 시선으로 보이실 거예요."]],"bigben":[["h2","AI 여행 가이드"],["h3","1️⃣ 기본 정보"],["li","장소명: 빅벤 (Big Ben) / 정식 명칭 엘리자베스 타워(Elizabeth Tower)"],["li","위치: 웨스트민스터궁(국회의사당) 북쪽 끝, 템스강변"],["li","가까운 지하철역: Westminster역 (도보 2분)"],["li","추천 방문 소요 시간: 외부 관람 15~30분 / 내부 투어 시 약 2시간"],["li","입장료: 외부 관람 무료 / 내부 투어(사전예약 필수) 성인 약 £35"],["li","운영 시간: 외부는 24시간 개방 / 내부 투어는 월~토, 사전예약제로만 운영"],["li","이런 분께 추천: 런던 상징물을 놓치고 싶지 않은 분, 건축·시계 기계장치에 관심 있는 분, 사진 좋아하는 분"],["hr",""],["h3","2️⃣ 한 문장으로 이해하는 기본 소개"],["p","\"사실 '빅벤'은 시계탑이 아니라, 그 안에 걸린 13톤짜리 종의 이름인 곳\""],["p","전 세계에서 가장 유명한 시계라고 해도 과언이 아닌데, 정작 많은 사람이 이름부터 잘못 알고 있어요. 탑의 정식 이름은 엘리자베스 타워이고, \"빅벤\"은 원래 탑 안에 있는 거대한 종만을 가리키는 이름이었어요. 이 작은 사실 하나만 알고 가도 런던 여행의 재미가 확 달라집니다."],["hr",""],["h3","3️⃣ 역사와 이 장소만의 특징"],["p","1834년, 웨스트민스터궁이 큰 화재로 전소된 사건이 있었어요. 이후 국회의사당을 다시 지으면서 1843년부터 시계탑 건설이 시작됐고, 1859년에 완공됐어요. 처음엔 세인트 스티븐스 타워라는 이름으로 불렸는데, 2012년 엘리자베스 2세 여왕의 다이아몬드 주빌리(즉위 60주년)를 기념해서 지금의 이름으로 바뀌었어요."],["p","이름의 유래엔 두 가지 설이 있어요. 하나는 당시 공공사업 담당 위원이었던 벤저민 홀 경의 애칭 \"빅 벤\"에서 따왔다는 설, 다른 하나는 당대 유명 헤비웨이트 복서였던 벤저민 코운트의 이름에서 따왔다는 설이에요. 2차 세계대전 당시 웨스트민스터 일대가 폭격을 받았는데도 이 시계탑의 메커니즘은 멈추지 않고 계속 작동했다는 이야기가 전해져요. 실제로 117년 동안 거의 멈춘 적이 없다가, 2017~2022년 대규모 보수공사 때 처음으로 장기간 종소리를 멈춘 적이 있어요."],["p","한국으로 치면, 큰 화재로 소실된 궁궐을 재건하면서 함께 세운 상징적인 건축물이 그 나라를 대표하는 랜드마크가 된 셈이에요. 다만 여긴 그 탑 안의 종 이름이 탑 전체의 애칭으로 굳어졌다는 독특한 사연이 있죠."],["hr",""],["h3","4️⃣ 건축물(공간) 관람 포인트 설명"],["p","고딕 리바이벌 양식으로 지어진 탑으로, 높이는 약 96m예요."],["p","🔍 여기서 꼭 봐야 할 포인트 TOP 3"],["li","네 개의 시계 다이얼 — 지상에서 약 55m 높이에 있는 네 방향의 시계판이에요. 각 다이얼은 312개의 유리 조각으로 이뤄져 있어요."],["li","334개의 나선형 계단 (내부 투어 시) — 좁고 오래된 계단을 올라가며 19세기 시계 메커니즘을 직접 볼 수 있어요."],["li","거대한 종, 빅벤 자체 (내부 투어 시) — 13.76톤에 달하는 이 종이 정각에 울릴 때 바닥까지 진동하는 걸 느낄 수 있어요."],["p","실제로 서서 보면, 밤에 조명이 켜진 모습이 특히 인상적이에요. 국회가 개회 중일 땐 탑 위쪽에 특별한 조명이 켜진다는 것도 재미있는 디테일이에요."],["p","📸 사진 찍기 좋은 위치는 웨스트민스터 브릿지 위예요. 다리와 시계탑, 템스강을 한 프레임에 담을 수 있는 최고의 자리예요."],["hr",""],["h3","5️⃣ 주요 작품 / 상징적인 요소 소개"],["p","이곳을 대표하는 건 건물이 아니라 **\"매시 정각 울리는 차임벨 소리\"**예요. 웨스트민스터 콰터스(Westminster Quarters)라는 이름의 이 멜로디는 전 세계 여러 시계와 벨소리에서 차용될 정도로 유명해요."],["p","왜 중요하냐면, 이 소리가 단순한 시각 알림이 아니라 영국 민주주의와 시간의 정확함을 상징하는 소리이기 때문이에요. 6명의 군주와 41명의 총리가 이 종소리를 들으며 시대를 거쳐왔다는 이야기가 있을 정도로, 영국 역사와 함께한 소리예요. 처음 오시는 분들은 \"저 멜로디가 바로 그 유명한 빅벤 차임\"이라고 기억하시면 충분해요."],["hr",""],["h3","6️⃣ 알고 가면 여행이 더 재밌어지는 이야기"],["li","덜 붐비는 시간대: 오전 9시 이전이 가장 조용해요."],["li","동선 팁: 내부 투어를 원한다면 티켓이 매월 두 번째 수요일 오전 10시에 3개월 전 일정으로 풀리고 순식간에 매진되니, 미리 캘린더에 알람을 걸어두세요."],["li","사람들이 놓치기 쉬운 포인트: 다들 \"빅벤\"이라고 부르지만 사실 그건 종의 이름이라는 걸 모르는 분들이 많아요. 이 사실 하나만 알아도 동행에게 아는 척하기 좋은 팁이에요."],["li","주변 연계 코스: 도보로 몇 분이면 웨스트민스터 사원, 런던 아이, 트라팔가 광장까지 이어져요."],["p","이걸 알고 보시면, 단순히 \"런던의 시계탑\"이 아니라 \"화재로 무너진 궁을 다시 세우며 함께 태어난, 영국 역사의 시간을 지켜온 상징물\"이라는 시선으로 보이실 거예요."]],"goodwinscourt":[["h2","AI 여행 가이드"],["h3","1️⃣ 기본 정보"],["li","장소명: 굿윈스 코트 (Goodwin's Court)"],["li","위치: 코벤트 가든, 세인트 마틴스 레인과 베드퍼드버리 사이"],["li","가까운 지하철역: Leicester Square역, Covent Garden역"],["li","추천 방문 소요 시간: 5~15분 (워낙 짧은 골목이에요)"],["li","입장료: 무료 (공용 통로, 상시 개방)"],["li","운영 시간: 상시 (골목 자체는 24시간, 입점된 사무실들은 평일 업무시간 위주)"],["li","이런 분께 추천: 해리포터 팬, 사진 좋아하는 분, 숨은 골목 감성 좋아하는 분, 조지안 시대 건축에 관심 있는 분"],["hr",""],["h3","2️⃣ 한 문장으로 이해하는 기본 소개"],["p","\"1690년 그대로 멈춰있는 것 같은, 가스등이 켜진 조지안 시대 골목\""],["p","레스터 스퀘어와 코벤트 가든 사이, 화려한 관광지들 틈에 이렇게 조용하고 고풍스러운 골목이 숨어있다는 걸 아는 사람은 많지 않아요. 폭 2m, 길이 약 85m 정도밖에 안 되는 짧은 길이지만, 런던에서 가장 잘 보존된 조지안 시대 상점가 중 하나라서 지나칠 이유가 없는 곳이에요."],["hr",""],["h3","3️⃣ 역사와 이 장소만의 특징"],["p","이 골목은 원래 피셔스 앨리(Fisher's Alley)라는 이름으로 불렸어요. 17세기 후반 로버트 피셔가 이 일대 건물들을 사들이면서 시작됐고, 1690년경 조셋 굿윈이 지금의 건물들을 지으면서 굿윈스 코트라는 이름이 붙었어요."],["p","한때는 배우이자 왕의 정부였던 넬 궨(Nell Gwyn)이 이 근처에 살았다는 이야기도 전해지는데, 확실한 증거는 없어요. 1881년 인구조사 기록을 보면 재봉사, 마차 제작자, 시계공, 인쇄업자 등 다양한 직업의 사람들이 이 골목에 살았다고 하니, 당시엔 서민들의 삶이 촘촘하게 얽혀 있던 골목이었던 거예요. 1930년대엔 건물이 너무 낡아서 철거될 위기에 놓였는데, 레슬리 심슨이라는 사람이 골목 전체를 사들여서 지금처럼 복원했어요."],["p","한국으로 치면, 재개발 위기에 놓였던 옛 골목이 한 사람의 손으로 보존돼서 지금까지 원형을 유지하고 있는 서울 익선동 한옥 골목과 비슷한 흐름이에요. 다만 여긴 300년도 넘은 건물이 그대로 남아있다는 점이 다르죠."],["hr",""],["h3","4️⃣ 건축물(공간) 관람 포인트 설명"],["p","건물들은 1690년대에 지어졌고, 지금 보이는 볼록한 나무 창틀은 18세기 후반에 추가된 거예요."],["p","🔍 여기서 꼭 봐야 할 포인트 TOP 3"],["li","볼록한 나무 상점 창문(bow window) — 광택 나는 검은 대문과 함께, 당시 상인들이 물건을 매력적으로 진열하기 위해 만든 구조예요. 18세기 상점의 모습을 그대로 보여줘요."],["li","골목에 남은 가스등 — 런던에 아직 남아있는 몇 안 되는 실제 가스등 중 하나예요. 밤에 오면 이 은은한 불빛이 골목 전체를 신비롭게 비춰요."],["li","1번지 건물의 낡은 계단 — 오래 사용된 흔적이 뚜렷한 돌계단이 있는데, 이 건물보다도 더 오래된 재료를 재활용했을 가능성이 있다고 해요."],["p","실제로 서서 보면, 바로 옆 큰길의 시끌벅적함이 순식간에 사라지는 게 느껴져요. 조용하고 고즈넉한 분위기라 마치 다른 시대로 순간이동한 느낌을 줘요."],["p","📸 사진 찍기 좋은 위치는 골목 중간, 볼록한 창문들이 나란히 보이는 자리예요. 가스등과 함께 프레임에 담으면 특히 분위기 있는 사진이 나와요."],["hr",""],["h3","5️⃣ 주요 작품 / 상징적인 요소 소개"],["p","굿윈스 코트를 대표하는 건 특정 상점이 아니라 **\"해리포터 다이애건 앨리(혹은 녹턴 앨리)의 실제 모델로 추정되는 골목\"**이라는 소문이에요."],["p","J.K. 롤링이 직접 확인해준 적은 없지만, 이 골목의 어두운 분위기와 좁은 통로, 오래된 상점 창문들이 소설 속 마법사들의 거리를 떠올리게 한다는 이유로 팬들 사이에서 오랫동안 회자되고 있어요. 실제로 영화 촬영지로 검토됐지만 통로가 너무 좁아서 촬영 장비가 들어갈 수 없어 포기됐다는 이야기도 있어요. 대신 2018년 영화 '메리 포핀스 리턴즈'의 한 장면이 실제로 이곳에서 촬영됐어요. 처음 오시는 분들은 \"해리포터 성지 후보 중 하나\"라고 기억하시면 충분해요."],["hr",""],["h3","6️⃣ 알고 가면 여행이 더 재밌어지는 이야기"],["li","덜 붐비는 시간대: 원래 사람이 많지 않은 골목이라 언제 가도 조용해요. 저녁에 가스등이 켜진 모습을 보고 싶다면 해질 무렵을 추천해요."],["li","동선 팁: 세인트 마틴스 레인 쪽에서 들어가면 입구가 눈에 잘 안 띄니, 지도 앱으로 정확한 위치를 미리 확인하고 가세요."],["li","사람들이 놓치기 쉬운 포인트: 다들 사진만 찍고 지나가시는데, 이 골목이 세실 코트, 리든홀 마켓과 함께 \"다이애건 앨리 후보 3대장\"으로 불린다는 사실을 알고 보면 나머지 두 곳도 함께 도는 재미가 생겨요."],["li","주변 연계 코스: 걸어서 1~2분이면 세실 코트로 바로 이어져요. 두 골목을 연달아 보시는 걸 강력 추천해요."],["p","이걸 알고 보시면, 단순히 \"예쁜 골목\"이 아니라 \"300년 넘게 원형을 지켜온, 런던 서민의 삶과 문학적 상상력이 함께 스며든 공간\"이라는 시선으로 보이실 거예요."]],"cecilcourt":[["h2","AI 여행 가이드"],["h3","1️⃣ 기본 정보"],["li","장소명: 세실 코트 (Cecil Court), 애칭 \"북셀러스 로우(Booksellers' Row)\""],["li","위치: 채링 크로스 로드와 세인트 마틴스 레인 사이, 코벤트 가든 인근"],["li","가까운 지하철역: Leicester Square역"],["li","추천 방문 소요 시간: 20~40분"],["li","입장료: 무료 (보행자 전용 골목)"],["li","운영 시간: 골목은 상시 개방, 개별 상점은 대체로 월~토 오전 10:30~11시경 오픈, 오후 6~7시 마감"],["li","이런 분께 추천: 책·고서적 좋아하는 분, 해리포터 팬, 골동품 좋아하는 분, 영화 역사에 관심 있는 분"],["hr",""],["h3","2️⃣ 한 문장으로 이해하는 기본 소개"],["p","\"모차르트가 여덜 살에 머물렀고, 초기 영국 영화 산업의 중심지였다가, 지금은 20여 개의 고서점이 모인 거리\""],["p","굿윈스 코트와 세트로 묶여 다이애건 앨리 후보로 유명하지만, 사실 이곳은 그 소문보다 훨씬 다채로운 역사를 가지고 있어요. 책, 영화, 음악이 각기 다른 시대에 이 짧은 골목을 거쳐 갔다는 게 진짜 매력이에요."],["hr",""],["h3","3️⃣ 역사와 이 장소만의 특징"],["p","세실 코트라는 이름은 엘리자베스 1세와 제임스 1세 시대 궁정 대신이었던 로버트 세실에서 따왔어요. 17세기 말부터 이 거리가 개발됐는데, 1735년엔 한 세입자가 낸 것으로 추정되는 화재로 거리 대부분이 불타버린 적도 있어요."],["p","정말 흥미로운 건 1764년이에요. 여덜 살이었던 모차르트가 유럽 투어 중 이 거리 9번지의 이발사 존 쿠진의 집에서 약 4개월을 머물렀어요. 이 기간 동안 조지 3세 앞에서 두 번이나 연주를 했고, 일부 학자들은 첫 번째 교향곡을 이곳에서 작곡했을 가능성도 제기해요. 그로부터 100년 후엔 완전히 다른 산업이 이 거리를 채웠어요. 1897년부터 초기 영국 영화사들이 사무실을 열면서 \"플리커 앨리(Flicker Alley)\"라는 별명이 붙었고, 세계적으로 유명한 서점 포일스(Foyles)도 1904년에 이 거리에서 시작했어요. 1차 세계대전 이후 영화 산업이 빠지면서 서점들이 그 자리를 채웠고, 1930년대부터 지금의 \"북셀러스 로우\"라는 정체성이 자리 잡았어요."],["p","한국으로 치면, 한 골목이 시대마다 완전히 다른 산업의 중심지였다가 지금은 헌책방 거리로 자리 잡은 셈이에요. 서울 답십리 고서점 거리와 비슷한 정체성이지만, 세실 코트는 그 앞선 역사가 음악과 영화까지 아우른다는 점이 훨씬 특별해요."],["hr",""],["h3","4️⃣ 건축물(공간) 관람 포인트 설명"],["p","지금 보이는 건물들은 대부분 19세기 후반 빅토리아 시대 상점 건물이에요."],["p","🔍 여기서 꼭 봐야 할 포인트 TOP 3"],["li","빅토리안 상점 파사드 — 100년 넘게 거의 그대로 유지된 상점 정면들이에요. 걸어가는 것만으로도 시간여행을 하는 느낌을 줘요."],["li","9번지의 모차르트 명판 — 2011년에 설치된 파란 명판으로, 어린 모차르트가 실제로 머물렀던 자리를 표시해요."],["li","각 서점의 특색 있는 진열창 — 지도, 고서, 영화 포스터, 은제품 등 서점마다 완전히 다른 전문 분야를 가지고 있어서, 창문만 구경해도 재미있어요."],["p","실제로 서서 보면, 바로 옆 채링 크로스 로드의 복잡함과는 완전히 다른 차분한 분위기가 느껴져요. 책 향기와 오래된 종이 냄새가 골목 전체에 퍼져있는 느낌이에요."],["p","📸 사진 찍기 좋은 위치는 골목 입구에서 안쪽을 바라보는 자리예요. 양쪽으로 늘어선 서점 간판들이 대칭적으로 잡혀서 예쁜 사진이 나와요."],["hr",""],["h3","5️⃣ 주요 작품 / 상징적인 요소 소개"],["p","세실 코트를 대표하는 건 **\"왓킨스 북스(Watkins Books)\"**예요. 1901년부터 지금까지 이 거리를 지켜온, 런던에서 가장 오래된 신비주의·영성 전문 서점이에요."],["p","왜 중요하냐면, 이 서점이 세실 코트가 100년 넘게 서점 거리로서의 정체성을 이어온 산증인이기 때문이에요. 다른 서점들이 문을 열고 닫는 동안에도 이곳은 계속 같은 자리를 지켰거든요. 처음 오시는 분들은 \"가장 오래 살아남은 서점 = 왓킨스 북스\"라고 기억하시면 이 거리의 역사를 이해하기 쉬워요."],["hr",""],["h3","6️⃣ 알고 가면 여행이 더 재밌어지는 이야기"],["li","덜 붐비는 시간대: 오전 10~11시 오픈 직후가 가장 여유로워요."],["li","동선 팁: 채링 크로스 로드 쪽에서 들어가서 세인트 마틴스 레인 쪽으로 빠져나오면, 자연스럽게 굿윈스 코트로 이어지는 동선이 만들어져요."],["li","사람들이 놓치기 쉬운 포인트: 다들 해리포터 연관성만 보고 지나가시는데, 사실 모차르트 명판과 초기 영화산업의 흔적이 훨씬 깊은 역사를 담고 있어요. 9번지 명판을 꼭 찾아보세요."],["li","주변 연계 코스: 걸어서 1~2분이면 굿윈스 코트, 조금 더 가면 레스터 스퀘어와 트라팔가 광장까지 도보권이에요."],["p","이걸 알고 보시면, 단순히 \"헌책방 골목\"이 아니라 \"모차르트의 어린 시절, 초기 영국 영화산업, 그리고 100년 넘은 서점 문화가 층층이 쌓인 골목\"이라는 시선으로 보이실 거예요."]],"choosingkeeping":[["h2","AI 여행 가이드"],["h3","1️⃣ 기본 정보"],["li","장소명: 추징 키핑 (Choosing Keeping)"],["li","위치: 21 Tower Street, London (코벤트 가든 인근)"],["li","가까운 지하철역: Covent Garden역, Leicester Square역"],["li","추천 방문 소요 시간: 20~30분"],["li","입장료: 무료 (구경만 하는 것도 자유)"],["li","운영 시간: 매일 오전 11시~오후 6~7시경 (매장 확인 권장)"],["li","이런 분께 추천: 문구·다이어리 좋아하는 분, 감성 소품 좋아하는 분, 선물 쇼핑하고 싶은 분, 사진 좋아하는 분"],["hr",""],["h3","2️⃣ 한 문장으로 이해하는 기본 소개"],["p","\"디지털 시대에 오히려 반짝 뜨는, 세상에서 가장 예쁘게 큐레이션된 문구점\""],["p","런던 문구점들 중에서도 유독 인스타그램에 자주 등장하는 곳이 바로 여기예요. 단순히 펜이나 노트를 파는 게 아니라, \"물건을 신중하게 고르고 오래 아끼자\"는 브랜드 철학이 매장 곳곳에 스며있는 곳이라, 문구 애호가가 아니어도 구경할 가치가 있는 공간이에요."],["hr",""],["h3","3️⃣ 역사와 이 장소만의 특징"],["p","이 가게는 2012년, 런던 동쪽 콜롬비아 로드(꽃시장으로 유명한 거리)의 작은 매장에서 시작됐어요. 창업자 줄리아는 일본에서 보낸 어린 시절의 기억에서 영감을 받았다고 해요. 일본 문구 문화 특유의 \"물건 하나하나를 소중히 다루는\" 감성을 매장 전체에 담아낸 거예요."],["p","당시는 디지털이 모든 걸 대체할 거라는 이야기가 나오던 시기였는데, 오히려 그 흐름 속에서 사람들이 손으로 쓰는 것, 만질 수 있는 것에 대한 그리움을 느끼기 시작했어요. 추징 키핑은 이 감성을 정확히 포착해서, 콜롬비아 로드에서 시작한 작은 매장을 지금의 코벤트 가든 매장으로 키워냈어요."],["p","한국으로 치면, 디지털 다이어리가 대세인 시대에도 오히려 다꾸(다이어리 꾸미기) 문화가 인기를 끄는 것과 비슷한 흐름이에요. 다만 이곳은 그 감성을 매장 하나에 정교하게 압축해놨다는 점이 다르죠."],["hr",""],["h3","4️⃣ 건축물(공간) 관람 포인트 설명"],["p","매장 자체가 오래된 건물은 아니지만, 인테리어가 워낙 독특해서 공간 자체가 볼거리예요."],["p","🔍 여기서 꼭 봐야 할 포인트 TOP 3"],["li","패턴 포장지로 뒤덮인 벽면 — 매장 벽 전체가 알록달록한 패턴 포장지로 도배돼 있어서, 들어서는 순간부터 눈이 즐거워져요."],["li","전 세계에서 수집한 소량 생산 브랜드 진열 — 이탈리아산 종이, 희귀 펜과 연필들이 큐레이션돼 있어서, 흔한 문구점과는 완전히 다른 느낌을 줘요."],["li","레터 실링 왁스·크레용 등 아날로그 소품 코너 — 요즘 흔히 안 쓰는 물건들이 예쁘게 진열돼 있어서, 그 자체로 작은 전시를 보는 느낌이에요."],["p","실제로 서서 보면, 물건이 빽빽하게 진열되어 있어도 답답하지 않고 오히려 아늑한 느낌이 들어요. 색과 패턴이 조화롭게 배치돼서 어디를 봐도 사진이 예쁘게 나와요."],["p","📸 사진 찍기 좋은 위치는 매장 입구예요. 크리스마스나 할로윈 시즌엔 시즌 장식이 화려하게 더해지니 그 시기에 방문하면 더 특별한 사진을 남길 수 있어요."],["hr",""],["h3","5️⃣ 주요 작품 / 상징적인 요소 소개"],["p","이 매장을 대표하는 건 특정 제품이 아니라 매장 이름 자체에 담긴 철학이에요. \"Choosing Keeping\"이라는 이름은 \"신중하게 고르고, 오래 아끼자\"는 뜻을 담고 있어요."],["p","왜 중요하냐면, 이게 단순한 마케팅 문구가 아니라 이 브랜드가 물건을 큐레이션하는 기준 자체이기 때문이에요. 실제로 이곳의 상품들은 대량생산 제품보다는 소규모 독립 브랜드에서 소싱한 것들이 대부분이에요. 처음 오시는 분들은 \"예쁜 문구를 파는 곳이 아니라, 오래 쓸 물건을 신중하게 골라주는 곳\"이라고 이해하시면 딱 맞아요."],["hr",""],["h3","6️⃣ 알고 가면 여행이 더 재밌어지는 이야기"],["li","덜 붐비는 시간대: 평일 오전이 가장 여유로워요. 주말 오후는 사진 찍는 손님들로 좁은 매장이 붐빌 수 있어요."],["li","동선 팁: 코벤트 가든 마켓 구경 후 세븐 다이얼스 방향으로 걷다가 잠깐 들르기 좋은 위치예요."],["li","사람들이 놓치기 쉬운 포인트: 다들 눈에 보이는 화려한 소품만 구경하시는데, 매장 안쪍 코너에 있는 희귀 펜과 잉크 컬렉션도 꼭 살펴보세요. 아는 사람만 아는 진짜 보물이 거기 있어요."],["li","주변 연계 코스: 도보로 몇 분이면 세븐 다이얼스, 닐스 야드까지 이어져요. 코벤트 가든 소품샵 투어에 자연스럽게 끼워 넣기 좋아요."],["p","이걸 알고 보시면, 단순히 \"예쁜 문구점\"이 아니라 \"디지털 시대에도 손으로 만지는 물건의 가치를 되살린, 신중한 소비 철학이 담긴 공간\"이라는 시선으로 보이실 거예요."]],"paulsmith":[["h2","AI 여행 가이드"],["h3","1️⃣ 기본 정보"],["li","장소명: 폴 스미스 코번트가든 (Paul Smith, Floral Street)"],["li","위치: 40-44 Floral St, London WC2E 9TB"],["li","가까운 지하철역: Covent Garden역 (도보 3분)"],["li","추천 방문 소요 시간: 20~40분"],["li","입장료: 무료"],["li","운영 시간: 월~수·금 10:30~18:30 / 목 10:30~19:00 / 토 10:00~19:00 / 일 12:30~17:30"],["li","이런 분께 추천: 영국 패션 좋아하는 분, 인테리어 감성 좋아하는 분, 사진 좋아하는 분, 편집숍 구경 좋아하는 분"],["hr",""],["h3","2️⃣ 한 문장으로 이해하는 기본 소개"],["p","\"낡은 빵집이었던 자리에서 45년째 자리를 지켜온, 영국 디자이너 폴 스미스의 첫 런던 매장\""],["p","코벤트 가든의 플로럴 스트리트를 걷다 보면 이 매장을 그냥 예쁜 옷가게로만 지나치기 쉬운데, 사실 여긴 폴 스미스라는 브랜드의 뿌리와 코벤트 가든의 변화상을 함께 볼 수 있는 곳이에요. 노팅엄 출신의 무명 디자이너가 세계적인 브랜드로 성장하는 시작점이 바로 여기였거든요."],["hr",""],["h3","3️⃣ 역사와 이 장소만의 특징"],["p","플로럴 스트리트는 18세기엔 술집이 11개나 있던 낙후된 거리였어요. 폴 스미스가 이 거리에 매장을 열기로 결심한 이유도 바로 이 다채롭고 거친 역사 때문이었다고 해요."],["p","1979년, 원래 다 쓰러져가던 작은 빵집 자리였던 44번지에 폴 스미스의 첫 런던 매장이 문을 열었어요. 당시 폴 스미스는 아직 무명에 가까운 디자이너였는데, 3년 전인 1976년 파리에서 처음 남성복 라인을 선보인 게 시작이었어요. 이 매장이 성공을 거두면서 옆 건물들(41, 42, 43번지)까지 차례로 사들여 지금의 규모로 확장했어요."],["p","한국으로 치면, 신진 디자이너가 낙후된 골목 상가에서 시작해 몇십 년 만에 세계적인 브랜드로 성장한 셈이에요. 다만 여긴 지금까지도 창업 당시 그 자리를 그대로 지키고 있다는 점이 특별하죠."],["hr",""],["h3","4️⃣ 건축물(공간) 관람 포인트 설명"],["p","건물 자체는 오래된 상가 건물이지만, 내부는 폴 스미스 특유의 감성으로 리노베이션돼 있어요."],["p","🔍 여기서 꼭 봐야 할 포인트 TOP 3"],["li","마호가니 목재 캐비닛 — 리노베이션 과정에서 복원된 마호가니 진열장이 매장 벽을 따라 이어져 있어요. 클래식하면서도 세련된 느낌을 줘요."],["li","다채로운 예술품·수집품 진열 — 옷 외에도 각종 아트 작품, 가구, 오브제들이 매장 곳곳에 놓여있어서, 옷가게라기보단 큐레이션된 갤러리 느낌이 강해요."],["li","지하층 맞춤 수트룸 — 지하로 내려가면 정장 맞춤과 수선 서비스를 제공하는 전용 공간이 있어요. 폴 스미스 특유의 클래식한 테일러링을 느낄 수 있는 곳이에요."],["p","실제로 서서 보면, 화려한 시그니처 스트라이프 패턴과 클래식한 목재 인테리어가 묘하게 잘 어울려요. 옷을 안 사더라도 매장 곳곳의 독특한 소품들을 구경하는 재미가 있어요."],["p","📸 사진 찍기 좋은 위치는 매장 정문이에요. 폴 스미스 특유의 컬러풀한 쇼윈도 디스플레이가 계절마다 바뀌니, 방문 시기에 따라 다른 느낌의 사진을 남길 수 있어요."],["hr",""],["h3","5️⃣ 주요 작품 / 상징적인 요소 소개"],["p","폴 스미스를 대표하는 건 바로 **\"시그니처 스트라이프(Signature Stripe)\"**예요. 여러 색이 촘촘하게 배열된 이 줄무늬 패턴이 브랜드의 상징이 됐어요."],["p","왜 중요하냐면, 이 패턴이 폴 스미스가 추구하는 \"클래식한 영국 스타일에 유쾌한 컬러감을 더한다\"는 디자인 철학을 가장 압축적으로 보여주기 때문이에요. 실제로 최근 코벤트 가든 마켓 빌딩에서 이 스트라이프를 테마로 한 대형 조명 설치 작업이 진행된 적도 있어요. 처음 오시는 분들은 \"알록달록한 줄무늬 = 폴 스미스\"라고 기억하시면 충분해요."],["hr",""],["h3","6️⃣ 알고 가면 여행이 더 재밌어지는 이야기"],["li","덜 붐비는 시간대: 평일 오전 오픈 직후가 가장 여유로워요."],["li","동선 팁: 코벤트 가든 마켓에서 세븐 다이얼스 방향으로 걷다 보면 자연스럽게 플로럴 스트리트를 지나게 돼요. 다른 편집숍들과 함께 묶어서 산책하기 좋아요."],["li","사람들이 놓치기 쉬운 포인트: 다들 1층 옷만 구경하고 나가시는데, 매장 곳곳에 숨겨진 예술품과 오브제들을 자세히 살펴보면 폴 스미스가 얼마나 다양한 컬렉터적 취향을 가진 디자이너인지 느껴져요."],["li","주변 연계 코스: 도보로 몇 분이면 코벤트 가든 마켓, 세븐 다이얼스, 닐스 야드까지 이어져요. 코벤트 가든 산책 코스에 자연스럽게 끼워 넣기 좋습니다."],["p","이걸 알고 보시면, 단순히 \"옷 가게\"가 아니라 \"무명 디자이너가 낙후된 골목에서 시작해 45년째 그 자리를 지키며 성장한, 영국 패션의 살아있는 역사\"라는 시선으로 보이실 거예요."]],"soho":[["h2","AI 여행 가이드"],["h3","1️⃣ 기본 정보"],["li","장소명: 소호 (Soho)"],["li","위치: 런던 웨스트민스터구, 웨스트엔드 지역"],["li","가까운 지하철역: Piccadilly Circus역, Leicester Square역, Tottenham Court Road역, Oxford Circus역"],["li","추천 방문 소요 시간: 2~4시간 (저녁 식사·나이트라이프까지 하면 반나절)"],["li","입장료: 무료 (동네 전체를 걸어 다니는 개념)"],["li","방문 참고 시간: 낮엔 상점·차이나타운, 저녁엔 레스토랑, 밤엔 바·재즈클럽이 각각 매력을 드러내는 시간대"],["li","이런 분께 추천: 미식·나이트라이프 좋아하는 분, 음악·영화 역사에 관심 있는 분, 자유로운 분위기 좋아하는 분, 다양성 존중하는 분"],["hr",""],["h3","2️⃣ 한 문장으로 이해하는 기본 소개"],["p","\"귀족들의 사냥터였다가, 이민자들의 피난처였다가, 지금은 런던에서 가장 자유롭고 다채로운 동네가 된 곳\""],["p","소호는 특정 건물이 아니라 하나의 생태계 같은 동네예요. 낮과 밤의 얼굴이 완전히 다르고, 골목마다 다른 문화가 겹겹이 쌓여 있어서, 런던에서 \"가장 밀도 높은 다양성\"을 느끼고 싶다면 여기가 정답이에요."],["hr",""],["h3","3️⃣ 역사와 이 장소만의 특징"],["p","소호라는 이름은 16세기 이 지역이 사냥터였을 때 사냥꾼들이 외치던 소리 \"소-호(So-ho)\"에서 따왔다고 해요. 처음엔 헨리 8세의 왕실 사냥터였다가, 17세기 후반부터 상류층 주거지로 개발되기 시작했어요."],["p","그런데 진짜 소호의 정체성은 그 이후에 만들어졌어요. 1685년 프랑스에서 종교 박해를 피해 온 위그노 신교도들이 대거 정착했고, 이후 그리스·이탈리아 이민자들, 20세기엔 중국계 이민자들이 차례로 자리를 잡으면서 지금의 차이나타운이 형성됐어요. 19세기 중반엔 상류층이 대부분 떠나고 인구밀도가 극도로 높아졌는데, 1854년엔 콜레라가 크게 발생해서 의사 존 스노우가 특정 우물을 감염원으로 지목하며 현대 공공보건학의 전환점이 된 사건도 여기서 일어났어요. 20세기엔 재즈클럽과 음악산업의 중심지가 됐고, 1959년 문을 연 로니 스콧츠(Ronnie Scott's)는 지금도 매일 밤 재즈 공연을 이어가고 있어요."],["p","한국으로 치면, 다양한 이민자 문화와 예술가들이 겹겹이 쌓이며 독특한 정체성을 만든 서울 이태원과 비슷한 결이 있어요. 다만 소호는 그 역사가 300년 넘게 이어지고, 각 시대의 흔적이 지금도 골목마다 남아있다는 점이 다르죠."],["hr",""],["h3","4️⃣ 건축물(공간) 관람 포인트 설명"],["p","소호는 특정 건축 양식이 아니라, 좁은 골목들이 얽혀있는 지역 전체의 구조가 특징이에요."],["p","🔍 여기서 꼭 봐야 할 포인트 TOP 3"],["li","버윅 스트리트(Berwick Street) — 1700년대부터 이어진 전통 시장 거리이자, 레코드숍들이 모여 있어 \"바이닐의 골든 마일\"로 불리는 곳이에요."],["li","제라드 스트리트(Gerrard Street, 차이나타운 중심) — 화려한 중국식 아치 게이트와 붉은 등, 다양한 음식점들이 밀집돼 있어요."],["li","소호 스퀘어(Soho Square) — 17세기 찰스 2세 동상이 있는 작은 공원이에요. 동네 한복판에서 잠깐 쉬어가기 좋은 초록 공간이에요."],["p","실제로 서서 보면, 몇 걸음마다 완전히 다른 분위기로 바뀌는 게 느껴져요. 좁은 골목 하나를 돌면 이탈리안 델리가, 또 하나를 돌면 재즈클럽이 나오는 식이에요."],["p","📸 사진 찍기 좋은 위치는 차이나타운 입구의 아치 게이트예요. 붉은색과 금색이 화려하게 장식돼 있어서 존재감 있는 사진이 나와요."],["hr",""],["h3","5️⃣ 주요 작품 / 상징적인 요소 소개"],["p","소호를 대표하는 건 특정 건물이 아니라 **\"음악과 다양성의 역사\"**예요. 이게 이 동네의 진짜 정체성이에요."],["p","1950년대 재즈클럽부터 시작해서, 롤링 스톤스와 지미 헨드릭스가 무명 시절 연주했던 마키 클럽, 1980년대부터 지금까지 이어지는 LGBTQ+ 커뮤니티의 중심 올드 콤튼 스트리트까지, 소호는 매 시대마다 그 시대의 주류 문화가 아닌 것들을 받아들이며 성장한 동네예요. 처음 오시는 분들은 \"소호 = 런던에서 가장 자유로운 동네\"라고 기억하시면 충분해요."],["hr",""],["h3","6️⃣ 알고 가면 여행이 더 재밌어지는 이야기"],["li","덜 붐비는 시간대: 평일 낮이 가장 여유로워요. 주말 밤은 바와 클럽이 붐비니, 조용히 구경하고 싶다면 낮 시간을 추천해요."],["li","동선 팁: 피카딜리 서커스에서 시작해서 차이나타운 → 올드 콤튼 스트리트 → 소호 스퀘어 순으로 걸으면 동네의 다양한 얼굴을 자연스럽게 볼 수 있어요."],["li","사람들이 놓치기 쉬운 포인트: 다들 화려한 밤 문화만 기억하시는데, 사실 낮에 보면 이탈리안 델리, 오래된 서점, 조용한 골목들이 또 다른 매력을 보여줘요. 또 소호가 콜레라 연구의 발상지였다는 의외의 역사도 재미있는 이야깃거리예요."],["li","주변 연계 코스: 도보로 몇 분이면 코벤트 가든, 리젠트 스트리트, 카나비 스트리트까지 이어져요. 웨스트엔드 극장가와 함께 저녁 공연 전후로 들르기 좋습니다."],["p","이걸 알고 보시면, 단순히 \"나이트라이프 동네\"가 아니라 \"300년 넘게 이민자와 예술가, 자유로운 사람들이 겹겹이 쌓아온, 런던에서 가장 밀도 높은 문화적 층위를 가진 곳\"이라는 시선으로 보이실 거예요."]],"londonbridge":[["h2","AI 여행 가이드"],["h3","1️⃣ 기본 정보"],["li","장소명: 런던 브릿지 (London Bridge)"],["li","위치: 템스강 위, 런던 시티(City of London)와 서더크(Southwark) 사이"],["li","가까운 지하철역: London Bridge역 (다리 바로 옆)"],["li","추천 방문 소요 시간: 15~30분 (다리 자체는 짧지만, 주변까지 보면 1~2시간)"],["li","입장료: 무료"],["li","운영 시간: 상시 개방"],["li","이런 분께 추천: 런던 역사에 관심 있는 분, 도시 뷰 좋아하는 분, 사진 좋아하는 분, \"타워 브릿지랑 뭐가 다르지?\" 궁금한 분"],["hr",""],["h3","2️⃣ 한 문장으로 이해하는 기본 소개"],["p","\"동요 'London Bridge is Falling Down'의 그 다리이지만, 사람들이 사진 찍는 화려한 다리는 사실 옆에 있는 타워 브릿지인 곳\""],["p","런던에서 가장 많이 오해받는 랜드마크가 바로 이 다리예요. 관광객들은 종종 이 다리와 화려한 고딕 양식의 타워 브릿지를 혼동하는데, 사실 지금의 런던 브릿지는 아주 평범하고 수수한 현대식 다리예요. 그런데 바로 그 \"수수함\" 뒤에 900년 넘는 진짜 역사가 숨어있다는 게 반전 포인트예요."],["hr",""],["h3","3️⃣ 역사와 이 장소만의 특징"],["p","로마 시대부터 이 자리엔 다리가 있었어요. 로마인들이 런던을 만들면서 템스강을 건너기 위해 처음 다리를 세운 게 시작이었죠. 이후 여러 차례 무너지고 다시 지어지는 과정을 반복했는데, 1014년경 바이킹 지도자 올라프가 다리를 파괴했다는 전설도 전해져요. 이 사건이 그 유명한 동요의 유래 중 하나로 꼽히기도 해요."],["p","본격적으로 유명해진 건 1176년, 헨리 2세 시대에 짓기 시작한 석조 다리예요. 완공까지 30년 넘게 걸렸는데, 완성된 후엔 다리 위에 상점과 집들이 늘어선 독특한 구조로 500년 넘게 템스강을 건너는 유일한 다리 역할을 했어요. 하지만 유지비 문제로 여러 차례 위기를 겪었고, 1282년엔 헨리 3세가 다리 운영 수익을 왕비에게 넘겼다가 관리가 부실해지면서 아치 다섯 개가 무너진 적도 있어요. 지금의 다리는 1973년에 새로 지어진 거고, 그 전 세대 다리(1831년 완공)는 1972년에 통째로 미국 애리조나주 레이크 하바수시티로 팔려가서 지금도 그곳에 서 있어요."],["p","한국으로 치면, 한강에 있던 오래된 다리가 여러 번 재건되면서도 이름과 자리만은 계속 이어져온 셈이에요. 다만 런던 브릿지는 그 옛 다리가 통째로 미국으로 팔려갔다는 독특한 반전이 있죠."],["hr",""],["h3","4️⃣ 건축물(공간) 관람 포인트 설명"],["p","지금의 다리는 1973년에 완공된 현대식 콘크리트 다리예요. 화려한 장식은 없지만, 그 대신 다리 위에서 보는 전망이 진짜 볼거리예요."],["p","🔍 여기서 꼭 봐야 할 포인트 TOP 3"],["li","다리 위에서 바라보는 타워 브릿지 — 런던 브릿지에서 동쪽을 보면, 진짜 화려한 고딕 양식의 타워 브릿지가 한눈에 들어와요. 두 다리를 비교해서 보는 재미가 있어요."],["li","더 샤드(The Shard) — 다리 남쪽 끝에 우뚝 솟은 유리 첨탑 빌딩이에요. 현대 런던의 스카이라인을 대표하는 건물이라, 다리와 함께 보면 신구 대비가 인상적이에요."],["li","다리 옆 계단 안내판 — 다리 근처 계단에 이 다리의 역사를 설명하는 명판이 있어요. 자세히 보면 예전 다리들의 사연을 알 수 있어요."],["p","실제로 서서 보면, 다리 자체는 특별할 게 없는데 오히려 그 평범함 때문에 \"여기가 진짜 900년 역사의 그 다리라고?\"하는 반전 매력이 느껴져요."],["p","📸 사진 찍기 좋은 위치는 다리 중앙에서 동쪽(타워 브릿지 방향)을 바라보는 자리예요. 타워 브릿지와 더 샤드를 한 프레임에 담을 수 있어요."],["hr",""],["h3","5️⃣ 주요 작품 / 상징적인 요소 소개"],["p","런던 브릿지를 대표하는 건 다리 자체가 아니라 \"London Bridge is Falling Down\"이라는 동요예요."],["p","왜 중요하냐면, 이 짧은 노래 한 곡이 이 다리가 겪은 900년의 굴곡진 역사를 압축적으로 담고 있기 때문이에요. 바이킹의 침략설부터, 화재로 손상됐던 이야기, 심지어 다리를 튼튼하게 하기 위해 사람을 희생시켰다는 다소 오싹한 민속학적 해석까지, 다양한 이야기가 이 노래 하나에 얽혀있어요. 처음 오시는 분들은 \"저 노래에 나온 다리가 바로 여기, 그런데 정작 사진에서 본 화려한 다리는 옆에 있는 타워 브릿지\"라는 반전만 기억하시면 충분해요."],["hr",""],["h3","6️⃣ 알고 가면 여행이 더 재밌어지는 이야기"],["li","덜 붐비는 시간대: 이른 아침이나 늦은 저녁이 사람이 적고, 조명이 켜진 타워 브릿지를 볼 수 있어서 오히려 더 예뻐요."],["li","동선 팁: 런던 브릿지역에서 내려서 다리를 건넌 뒤, 버로우 마켓(Borough Market)까지 이어서 걸으시면 좋아요. 도보로 몇 분이면 도착해요."],["li","사람들이 놓치기 쉬운 포인트: 다들 사진 찍을 땐 타워 브릿지 쪽으로만 가시는데, 정작 \"London Bridge\"라는 역명과 표지판이 붙은 이 평범한 다리가 진짜 역사적인 그 다리라는 사실을 모르고 지나가는 경우가 많아요. 헷갈리지 않게 미리 알고 가시면 훨�8 재미있어요."],["li","주변 연계 코스: 도보로 몇 분이면 더 샤드, 버로우 마켓, 그리고 다리를 건너면 런던 시티와 세인트 폴 대성당까지 이어져요. 타워 브릿지까지도 도보 15분 정도라 함께 묶어서 보기 좋아요."],["p","이걸 알고 보시면, 단순히 \"평범한 다리\"가 아니라 \"900년 넘게 무너지고 다시 지어지며 런던의 역사를 그대로 품고 있는, 동요 속 진짜 주인공\"이라는 시선으로 보이실 거예요."]],"londoneye":[["h2","AI 여행 가이드"],["h3","1️⃣ 기본 정보"],["li","장소명: 런던 아이 (London Eye)"],["li","위치: 템스강 남측, 워털루 인근 (웨스트민스터 브릿지와 헝거포드 브릿지 사이)"],["li","가까운 지하철역: Waterloo역"],["li","추천 방문 소요 시간: 탑승 30분 + 대기시간 포함 1~1.5시간"],["li","입장료: 유료, 성인 기준 대략 £30~40대 (시즌·시간대별 변동)"],["li","운영 시간: 대체로 오전 11시~오후 6시 전후 (계절별 상이, 홈페이지 확인 권장)"],["li","이런 분께 추천: 런던 전경 좋아하는 분, 사진 좋아하는 분, 커플·가족 여행객, 현대 건축에 관심 있는 분"],["hr",""],["h3","2️⃣ 한 문장으로 이해하는 기본 소개"],["p","\"밀레니엄을 기념하려고 만든 임시 구조물이었는데, 인기가 너무 많아서 그냥 영구 랜드마크가 된 곳\""],["p","원래 5년만 세워둘 계획이었던 이 대관람차가 지금은 25년 넘게 런던 스카이라인의 필수 요소가 됐어요. 실패할 뻔했던 밀레니엄 프로젝트가 오히려 대성공을 거둔 사례라, 그 반전 스토리 자체가 재미있는 곳이에요."],["hr",""],["h3","3️⃣ 역사와 이 장소만의 특징"],["p","이 대관람차의 시작은 1993년, 부부 건축가 데이비드 마크스와 줄리아 바필드가 새 밀레니엄을 기념할 랜드마크 공모전에 낸 아이디어였어요. 수상은 못 했지만, 두 사람은 이 아이디어를 포기하지 않고 직접 프로젝트를 밀어붙였어요."],["p","자금 조달이 쉽지 않았는데, 결정적으로 영국항공(British Airways)이 투자를 결정하면서 프로젝트가 본격화됐어요. 1998년 건설이 시작됐고, 재미있는 건 이 거대한 바퀴를 강 위에 눕혀서 조립한 다음 세웠다는 점이에요. 1999년 12월 31일, 토니 블레어 총리가 새천년을 맞아 공식 개장식을 열었지만, 기술적 문제로 실제 승객을 태우기 시작한 건 2000년 3월이 되어서였어요. 원래는 임시 구조물로 5년 후 철거될 계획이었지만, 인기가 워낙 높아서 그냥 영구 시설로 남게 됐어요."],["p","한국으로 치면, 특정 기념일을 위해 임시로 만든 상징물이 오히려 그 도시의 대표 랜드마크로 자리 잡은 셈이에요. 서울의 어떤 임시 조형물이 두고두고 사랑받아 정식 랜드마크가 된 것과 비슷한 흐름이라고 보시면 됩니다."],["hr",""],["h3","4️⃣ 건축물(공간) 관람 포인트 설명"],["p","높이 135m, 지름 120m에 달하는 캔틸레버(외팔보) 구조의 관람차예요. 한쪽에서만 지지되는 독특한 구조가 특징이에요."],["p","🔍 여기서 꼭 봐야 할 포인트 TOP 3"],["li","32개의 캡슐 — 각 캡슐은 25명이 탈 수 있고, 완전 밀폐된 에어컨 시설이라 날씨와 무관하게 편안하게 탑승할 수 있어요."],["li","자전거 바퀴에서 착안한 구조 — 얇은 강철 케이블들이 바퀴를 지지하는 모습이 실제 자전거 바퀴의 스포크와 비슷해요."],["li","한 바퀴 도는 데 걸리는 30분 — 워낙 느리게 돌아서 탑승·하차 시 멈출 필요가 없을 정도예요."],["p","실제로 타보면, 날씨가 좋은 날은 최대 40km까지 내다볼 수 있어요. 빅벤, 세인트 폴 대성당, 버킹엄 궁전까지 한눈에 담기는 순간이 인상적이에요."],["p","📸 사진 찍기 좋은 위치는 웨스트민스터 브릿지 위나 강 건너편 국회의사당 쪽이에요. 밤에 조명이 켜진 관람차와 빅벤을 함께 담으면 특히 예뻐요."],["hr",""],["h3","5️⃣ 주요 작품 / 상징적인 요소 소개"],["p","런던 아이를 대표하는 건 특정 작품이 아니라 **\"새해 전야 불꽃놀이의 배경\"**이라는 역할이에요."],["p","왜 중요하냐면, 매년 12월 31일 밤 런던의 새해 카운트다운 불꽃놀이가 이 관람차를 중심으로 펼쳐지고, 전 세계에 생중계되기 때문이에요. 이 장면이 전 세계인들에게 \"런던의 새해\"를 상징하는 이미지로 각인됐어요. 처음 오시는 분들은 \"낮엔 전망대, 밤엔 새해 불꽃놀이의 주인공\"이라고 기억하시면 충분해요."],["hr",""],["h3","6️⃣ 알고 가면 여행이 더 재밌어지는 이야기"],["li","덜 붐비는 시간대: 평일 오전 오픈 직후나 해질 무렵이 대기시간이 짧고, 노을과 함께 도시 전경을 볼 수 있어 인기가 많아요."],["li","동선 팁: 온라인으로 미리 티켓을 구매하면 줄을 서지 않고 바로 탑승할 수 있는 패스트트랙 옵션이 있어요."],["li","사람들이 놓치기 쉬운 포인트: 다들 낮 시간대 전망만 생각하시는데, 해가 진 뒤 야경도 못지않게 아름다워요. 또 원래 5년짜리 임시 구조물이었다는 반전 스토리도 대화 소재로 좋아요."],["li","주변 연계 코스: 다리 건너 빅벤·국회의사당이 도보권이고, 강변을 따라 워털루, 사우스뱅크 센터까지 산책하기 좋아요."],["p","이걸 알고 보시면, 단순히 \"관람차\"가 아니라 \"실패할 뻔한 밀레니엄 프로젝트가 오히려 도시의 상징이 된, 반전 스토리를 가진 랜드마크\"라는 시선으로 보이실 거예요."]],"selfridges":[["h2","AI 여행 가이드"],["h3","1️⃣ 기본 정보"],["li","장소명: 젤리캣 스토어 (Jellycat) — 셀프리지스 백화점 4층"],["li","위치: Selfridges, 400 Oxford Street, London W1A 1AB"],["li","가까운 지하철역: Bond Street역"],["li","추천 방문 소요 시간: 20~40분"],["li","입장료: 무료 (체험 부스는 예약 필요)"],["li","운영 시간: 월~금 오전 10시~오후 10시, 토 오전 10시~오후 9시, 일 오전 11:30~오후 6시"],["li","이런 분께 추천: 인형·캐릭터 좋아하는 분, 사진 좋아하는 분, 귀여운 것에 약한 분, 선물 쇼핑하고 싶은 분"],["hr",""],["h3","2️⃣ 한 문장으로 이해하는 기본 소개"],["p","\"봉제인형을 파는 게 아니라, 진짜 피시 앤 칩스 가게처럼 '주문'해서 받는 곳\""],["p","셀프리지스 4층 장난감 코너를 그냥 지나치기 쉬운데, 이곳의 젤리캣 매장은 단순한 진열대가 아니에요. 실제 영국 피시앤칩스 가게를 그대로 재현한 트럭에서 \"주문\"을 하면 직원이 신문지에 싸서 건네주는, 완전히 새로운 형태의 리테일 경험이라 꼭 들러볼 만해요."],["hr",""],["h3","3️⃣ 역사와 이 장소만의 특징"],["p","젤리캣과 셀프리지스의 인연은 2000년부터 시작됐어요. 오랫동안 협업해온 두 브랜드가 2024~2025년, 젤리캣 25주년을 기념해 완전히 새로운 형태의 매장을 기획했어요. 그게 바로 \"피시 앤 칩스 익스피리언스\"예요."],["p","처음엔 뉴욕에서 선보인 \"다이너\" 콘셉트가 입소문을 타면서 화제가 됐고, 이 흐름을 이어받아 런던 셀프리지스에서는 영국을 대표하는 음식인 피시 앤 칩스를 테마로 한 팝업을 열었어요. 반응이 워낙 좋아서 원래 한시적 팝업이었던 이곳이 지금은 상시 운영되는 명소로 자리 잡았어요. 실제로 한 리테일 전문가는 이 매장을 보고 \"진짜 식당인 줄 알았다\"고 할 정도로 정교하게 만들어졌어요."],["p","한국으로 치면, 캐릭터 인형 브랜드가 백화점 한 코너를 완전히 테마파크처럼 꾸며서, 단순 쇼핑이 아니라 \"체험\"으로 만든 셈이에요. 다만 여긴 특정 국가 음식 문화(피시 앤 칩스)를 인형으로 재현했다는 점이 독특하죠."],["hr",""],["h3","4️⃣ 건축물(공간) 관람 포인트 설명"],["p","매장은 백화점 4층 한 코너에 만들어진 테마 공간이에요. 특징은 실제 노점 트럭을 그대로 재현한 디스플레이예요."],["p","🔍 여기서 꼭 봐야 할 포인트 TOP 3"],["li","피시 앤 칩스 밴(트럭) — 젤리캣 특유의 파란색으로 꾸며진 레트로 트럭이 매장 한가운데 자리하고 있어요. 실제로 이 앞에서 \"주문\"을 하는 방식이에요."],["li","대형 캐릭터들과의 포토존 — 초대형 \"코지 칩스\", \"아뮤저블 소세지\" 같은 캐릭터들이 실물 크기보다 훨씬 크게 만들어져 있어서 사진 찍기 좋아요."],["li","신문지 포장 서비스 — 구매한 인형을 실제 피시앤칩스처럼 신문지 스타일 종이로 포장해줘요. 이 포장 자체가 하나의 기념품이 돼요."],["p","실제로 서서 보면, 인형을 사는 게 아니라 정말 작은 놀이공원에 들어온 느낌이 들어요. 어른들도 동심으로 돌아가서 신나게 구경하는 모습을 볼 수 있어요."],["p","📸 사진 찍기 좋은 위치는 대형 캐릭터들 옆이에요. 특히 운전석에 앉은 \"티미 터틀\" 캐릭터와 함께 사진 찍는 게 인기예요."],["hr",""],["h3","5️⃣ 주요 작품 / 상징적인 요소 소개"],["p","이 매장을 대표하는 건 특정 인형이 아니라 \"릴리 피시(Lily Fish)\"예요. 미소를 짓고 있는 튀김 생선 모양 인형인데, 이 컬렉션의 시그니처 캐릭터예요."],["p","왜 중요하냐면, 이 캐릭터가 젤리캣이 평범한 사물(음식, 야채, 생활용품)을 어떻게 사랑스러운 캐릭터로 바꿔내는지 가장 잘 보여주는 예시이기 때문이에요. 처음 오시는 분들은 \"여기선 셀프리지스 한정판도 있다\"는 것만 기억하시면 좋아요. 셀프리지스 특유의 노란 미니백을 인형으로 만든 한정판도 이곳에서만 구할 수 있어요."],["hr",""],["h3","6️⃣ 알고 가면 여행이 더 재밌어지는 이야기"],["li","덜 붐비는 시간대: 평일 오전이 가장 여유로워요. 주말엔 아이들과 수집가들로 붐빌 수 있어요."],["li","동선 팁: 인터랙티브 카운터를 이용하려면 셀프리지스 홈페이지에서 방문 7일 전부터 예약이 열려요. 예약분이 빨리 마감되니 미리 확인하세요."],["li","사람들이 놓치기 쉬운 포인트: 다들 피시 앤 칩스 컬렉션만 구경하시는데, 매장 한쪽에 있는 바쉬풀 버니, 아뮤저블 크루아상 같은 스테디셀러 컬렉션도 종류가 엄청 다양해요."],["li","주변 연계 코스: 셀프리지스 자체가 워낙 크니, 다른 층의 크리스마스 월드나 뷰티 홀도 함께 구경하기 좋아요."],["p","이걸 알고 보시면, 단순히 \"인형 파는 코너\"가 아니라 \"쇼핑을 완전히 새로운 놀이 경험으로 바꿔놓은, 25년 된 브랜드의 창의력이 응축된 공간\"이라는 시선으로 보이실 거예요."]],"puma":[["h2","AI 여행 가이드"],["h3","1️⃣ 기본 정보"],["li","장소명: 퓨마 플래그십 스토어 런던 (Puma Flagship Store)"],["li","위치: 376-384 Oxford Street, London W1C 1JY"],["li","가까운 지하철역: Bond Street역 (도보 1~2분)"],["li","추천 방문 소요 시간: 20~40분"],["li","입장료: 무료"],["li","운영 시간: 옥스퍼드 스트리트 상점가 기준, 대체로 오전 9~10시~오후 9시 (확인 권장)"],["li","이런 분께 추천: 스포츠·스니커즈 좋아하는 분, F1·모터스포츠 팬, 브랜드 아카이브 구경 좋아하는 분"],["hr",""],["h3","2️⃣ 한 문장으로 이해하는 기본 소개"],["p","\"77년 역사의 브랜드가 유럽에서 처음으로 세운 플래그십, 옥스퍼드 스트리트 한복판에 등장\""],["p","카나비 스트리트에 있던 작은 퓨마 매장을 기억하시는 분이라면, 이 대형 플래그십의 등장이 꽤 상징적인 사건이에요. 2025년 12월에 문을 연 이곳은 퓨마가 유럽에서 세운 첫 번째 플래그십 매장이자, 브랜드 역사상 최대 규모의 유럽 매장이에요."],["hr",""],["h3","3️⃣ 역사와 이 장소만의 특징"],["p","퓨마는 2002년부터 런던 카나비 스트리트에 매장을 운영해왔어요. 오랫동안 그 자리를 지켜왔지만, 브랜드가 세계적으로 \"톱 3 스포츠 브랜드\"를 목표로 재정비 전략을 발표하면서, 유럽 시장에서의 존재감을 강화하기 위해 완전히 새로운 대형 매장을 기획했어요."],["p","2024년 라스베이거스에 북미 두 번째 플래그십을 연 데 이어, 2025년 12월 옥스퍼드 스트리트에 이 매장을 열면서 유럽 최초 플래그십이라는 타이틀을 얻었어요. 개장을 기념해서 디자이너 헤이코 데센스가 만든 \"런던 익스클루시브 컬렉션\"도 함께 공개됐는데, 유니언 잭과 해리스 트위드 같은 영국 전통 요소를 현대적으로 재해석한 게 특징이에요."],["p","한국으로 치면, 오랫동안 작은 매장으로만 존재했던 브랜드가 어느 날 지역 최대 규모의 플래그십을 열면서 \"이제 진짜 승부를 보겠다\"는 선언을 한 셈이에요. 다만 여긴 그 선언이 유럽 대륙 전체를 상대로 한 것이라는 점이 다르죠."],["hr",""],["h3","4️⃣ 건축물(공간) 관람 포인트 설명"],["p","매장 규모는 약 24,000평방피트(약 2,230㎡)에 달해요. 오래된 건물이 아니라 현대적으로 새로 꾸민 대형 리테일 공간이에요."],["p","🔍 여기서 꼭 봐야 할 포인트 TOP 3"],["li","디지털 러닝 비디오월 — 퓨마의 NITRO 러닝 기술을 시각적으로 보여주는 대형 스크린으로, 터치할 때마다 반응하는 인터랙티브 디스플레이예요."],["li","77년 역사 아카이브 공간 — 브랜드의 오랜 역사를 상징하는 옛 제품과 자료들이 전시된 공간이에요."],["li","커스터마이징 존 — 신발이나 의류를 개인 취향에 맞게 커스터마이징할 수 있는 여러 존이 마련돼 있어요."],["p","실제로 서서 보면, 스포츠 매장이라기보다 체험형 전시장 같은 느낌이 강해요. 축구화, 러닝화 같은 퍼포먼스 라인부터 스트리트 패션까지 한 공간에서 다 볼 수 있어요."],["p","📸 사진 찍기 좋은 위치는 디지털 러닝 비디오월 앞이에요. 화려한 조명과 영상이 배경이 되어 역동적인 사진이 나와요."],["hr",""],["h3","5️⃣ 주요 작품 / 상징적인 요소 소개"],["p","이 매장을 대표하는 건 개장과 함께 나온 **\"런던 익스클루시브 컬렉션\"**이에요. 유니언 잭과 해리스 트위드(스코틀랜드 전통 원단)를 현대적으로 재해석한 한정판 라인이에요."],["p","왜 중요하냐면, 이 컬렉션이 독일 브랜드인 퓨마가 \"런던 커뮤니티의 정신과 창의적 에너지\"에서 영감을 받았다는 걸 보여주는 상징적인 제품이기 때문이에요. 오직 이 매장에서만 구매할 수 있어요. 처음 오시는 분들은 \"여기서만 파는 영국 한정판이 있다\"는 것만 기억하시면 충분해요."],["hr",""],["h3","6️⃣ 알고 가면 여행이 더 재밌어지는 이야기"],["li","덜 붐비는 시간대: 평일 오전이 가장 여유로워요. 옥스퍼드 스트리트 특성상 주말엔 항상 붐비는 편이에요."],["li","동선 팁: 매장 개장 이후 F1 애스턴 마틴 팀과의 협업 이벤트 등 다양한 활동이 이어지고 있으니, 방문 전 이벤트 일정을 확인해보면 좋아요."],["li","사람들이 놓치기 쉬운 포인트: 다들 신발과 옷만 구경하시는데, 아카이브 공간에 전시된 77년 역사 자료를 꼭 살펴보세요. 브랜드의 진짜 스토리가 거기 있어요."],["li","주변 연계 코스: 도보로 몇 분이면 셀프리지스, 본드 스트리트까지 이어져요."],["p","이걸 알고 보시면, 단순히 \"스포츠 브랜드 매장\"이 아니라 \"77년 역사의 브랜드가 유럽 시장에 대한 자신감을 건 첫 승부수\"라는 시선으로 보이실 거예요."]],"ludgate":[["h2","AI 여행 가이드"],["h3","1️⃣ 기본 정보"],["li","장소명: 루드게이트 힐 (Ludgate Hill)"],["li","위치: 런던 시티오브런던, 세인트 폴 대성당으로 이어지는 언덕길"],["li","가까운 지하철역: St Paul's역, City Thameslink역"],["li","추천 방문 소요 시간: 15~30분 (세인트 폴 대성당까지 보면 1시간 이상)"],["li","입장료: 무료 (거리 자체는 상시 개방)"],["li","운영 시간: 상시"],["li","이런 분께 추천: 사진 좋아하는 분, 런던 역사에 관심 있는 분, 도시 경관·건축 좋아하는 분"],["hr",""],["h3","2️⃣ 한 문장으로 이해하는 기본 소개"],["p","\"기원전 신화 속 왕의 이름을 딴 문에서 시작해, 지금은 세인트 폴 대성당으로 이어지는 런던 최고의 뷰포인트\""],["p","세인트 폴 대성당을 향해 걸어 올라가는 이 짧은 언덕길이, 사실 런던에서 가장 오래된 상징적 지형 중 하나예요. 시티오브런던의 3대 언덕(러드게이트 힐, 타워 힐, 콘힐) 중 하나이자, 이 도시의 종교적·역사적 중심축이 지나가는 길이에요."],["hr",""],["h3","3️⃣ 역사와 이 장소만의 특징"],["p","전설에 따르면 이 거리의 이름은 기원전 66년, 신화 속 브리튼 왕 루드(Lud)가 만든 문에서 따왔다고 해요. 12세기에 쓰인 제프리 오브 몬머스의 역사서에 이 전설이 기록돼 있는데, 실제로는 로마인들이 처음 성문을 세웠을 가능성이 더 크다고 학자들은 보고 있어요. 이 러드게이트라는 문은 감옥까지 딸려 있었는데, 1760년에 철거됐어요."],["p","이 언덕의 정상, 시티오브런던에서 가장 높은 지점(해발 17.6m)에 세인트 폴 대성당이 자리해요. 604년, 이 자리엔 이미 첫 번째 성당이 있었다는 기록이 있으니, 종교적 중심지로서의 역사가 1,400년 넘게 이어진 거예요. 지금 우리가 보는 대성당은 크리스토퍼 렌이 설계해서 1710년에 완공한 건물인데, 1666년 런던 대화재로 무너진 이전 성당의 자리에 새로 지어진 거예요."],["p","한국으로 치면, 신화 속 인물의 이름이 붙은 옛 성문 자리가 지금까지도 도시의 중심 종교시설로 이어지고 있는 셈이에요. 종로 보신각과 비슷하게, 이름과 위치의 상징성이 수백 년간 이어져 온 거리라고 보시면 이해가 빠르실 거예요."],["hr",""],["h3","4️⃣ 건축물(공간) 관람 포인트 설명"],["p","거리 자체는 완만한 언덕이고, 정상에 우뚝 선 세인트 폴 대성당의 돔이 어디서나 시야에 들어와요."],["p","🔍 여기서 꼭 봐야 할 포인트 TOP 3"],["li","언덕 아래에서 바라보는 대성당 전경 — 언덕 밑에서 위를 올려다보면, 좁은 거리 끝에 대성당의 웅장한 돔이 딱 맞춰 들어오는 구도가 인상적이에요."],["li","세인트 마틴 러드게이트 교회 — 언덕 중간쯔음, 예전에 러드게이트 문과 물리적으로 붙어있던 작은 교회예요. 대성당의 웅장함과 대비되는 소박한 매력이 있어요."],["li","패터노스터 스퀘어 — 대성당 바로 북쪽에 있는 광장으로, 2004년부터 런던 증권거래소가 자리하고 있어요."],["p","실제로 서서 보면, 좁은 거리와 그 끝에 우뚝 선 거대한 돔의 대비가 극적이에요. 18세기 화가들이 이 구도를 즐겨 그렸던 이유를 실제로 걸어보면 알 수 있어요."],["p","📸 사진 찍기 좋은 위치는 언덕 아래쪽, 대성당을 정면으로 마주하는 자리예요. 좁은 거리 양옆 건물들이 자연스럽게 대성당으로 시선을 이끄는 구도가 나와요."],["hr",""],["h3","5️⃣ 주요 작품 / 상징적인 요소 소개"],["p","이 거리를 대표하는 건 특정 건물이 아니라 \"세인트 폴 대성당으로 향하는 시선의 축\" 그 자체예요."],["p","왜 중요하냐면, 18~19세기 화가들(캐널레토, 마를로우 등)이 이 각도에서 바라본 풍경을 즐겨 그렸을 정도로, 오래전부터 런던을 대표하는 \"그림 같은 구도\"로 여겨졌기 때문이에요. 지금도 이 각도에서 바라본 대성당의 모습이 런던을 상징하는 이미지 중 하나로 쓰이고 있어요. 처음 오시는 분들은 \"이 거리는 대성당을 향해 걸어가는 길 자체가 볼거리\"라고 기억하시면 충분해요."],["hr",""],["h3","6️⃣ 알고 가면 여행이 더 재밌어지는 이야기"],["li","덜 붐비는 시간대: 이른 아침이 사람도 적고 조명도 좋아요."],["li","동선 팁: 플리트 스트리트에서 시작해서 러드게이트 힐을 올라가 세인트 폴 대성당으로 이어지는 동선이 자연스러워요."],["li","사람들이 놓치기 쉬운 포인트: 다들 대성당만 목표로 걸어 올라가시는데, 중간에 있는 세인트 마틴 러드게이트 교회나 옛 커피하우스 자리(지금은 펍)의 역사도 함께 살펴보면 이 거리의 층층이 쌓인 역사가 더 잘 느껴져요."],["li","주변 연계 코스: 도보로 몇 분이면 리플렉션 가든, 로열 익스체인지, 밀레니엄 브릿지까지 이어져요."],["p","이걸 알고 보시면, 단순히 \"성당으로 가는 길\"이 아니라 \"신화 속 왕의 이름이 붙은 성문에서 시작해, 1,400년 넘게 런던의 정신적 중심축 역할을 해온 거리\"라는 시선으로 보이실 거예요."]],"f1arcade":[["h2","AI 여행 가이드"],["h3","📍 기본 정보"],["li","유형: F1 시뮬레이터 아케이드·바"],["li","위치: 시티(로열 익스체인지 인근)"],["li","추천 소요: 1~1.5시간"],["li","운영: 12:00~01:00"],["h3","💡 한 문장 소개"],["p","실감형 F1 시뮬레이터로 레이싱을 즐기며 음식·칵테일도 먹는 엔터테인먼트 공간이에요."],["h3","✨ 특징 & 팁"],["li","인기가 많아 예약이 사실상 필수예요."],["li","그룹이 함께 순위를 겨루는 재미가 커요."],["li","편한 신발이 좋아요."]],"westminsterbridge":[["h2","AI 여행 가이드"],["h3","1️⃣ 기본 정보"],["li","장소명: 웨스트민스터 브릿지 (Westminster Bridge)"],["li","위치: 템스강 위, 웨스트민스터(북측)와 램버스(남측) 사이"],["li","가까운 지하철역: Westminster역"],["li","추천 방문 소요 시간: 15~20분"],["li","입장료: 무료"],["li","운영 시간: 상시 개방"],["li","이런 분께 추천: 사진 좋아하는 분, 시(詩)·문학에 관심 있는 분, 런던 스카이라인 좋아하는 분"],["hr",""],["h3","2️⃣ 한 문장으로 이해하는 기본 소개"],["p","\"의회의 색깔을 그대로 입은, 워즈워스가 시를 쓴 그 다리\""],["p","관광객들이 빅벤과 런던아이 사진을 찍기 위해 가장 많이 서는 자리가 바로 이 다리예요. 그런데 다들 사진만 찍고 지나가는 이 초록색 다리에, 사실 200년 전 낭만주의 시인이 새벽에 서서 시를 썼다는 이야기가 숨어있어요."],["hr",""],["h3","3️⃣ 역사와 이 장소만의 특징"],["p","런던 브릿지가 500년 넘게 템스강의 유일한 다리였던 걸 기억하시나요? 웨스트민스터에 다리를 놓자는 제안은 1664년부터 나왔지만, 오랫동안 강력한 반대에 부딕혔어요. 결국 1736년 의회 승인을 받아 스위스 출신 엔지니어 찰스 라벨예의 설계로 1739~1750년 사이 첫 다리가 지어졌어요."],["p","1802년 9월 3일, 시인 윌리엄 워즈워스가 이 다리 위에서 새벽 런던의 풍경을 보고 감명받아 소네트를 썼어요. 지금 우리가 보는 다리는 그 첫 다리가 아니라, 1862년 새로 지어진 두 번째 다리예요. 초록색으로 칠해진 건 1970년부터인데, 이 색은 다리와 가까운 하원(House of Commons) 좌석 색깔을 따온 거예요. 반대로 상류에 있는 램버스 브릿지는 상원(House of Lords) 좌석 색인 빨간색으로 칠해져 있어요."],["p","한국으로 치면, 국회 인근 다리를 국회의 상징색으로 칠한다는 개념이 독특한데, 여긴 상원과 하원 색을 각각 다른 다리에 나눠 입혔다는 재치 있는 디테일이 있어요."],["hr",""],["h3","4️⃣ 건축물(공간) 관람 포인트 설명"],["p","지금의 다리는 1862년 완공된 7개의 아치로 이뤄진 철제 다리예요. 국회의사당 건축가 찰스 배리가 고딕 양식 디테일을 함께 디자인했어요."],["p","🔍 여기서 꼭 봐야 할 포인트 TOP 3"],["li","팔각형 가스등 — 런던에 남은 마지막 가스등 중 일부예요. 등 중앙에 빅토리아 여왕과 앨버트 공의 이니셜(V&A)이 새겨져 있어요."],["li","워즈워스 시 명판 — 다리 중간 하류 쪽에 그 유명한 소네트가 새겨진 작은 명판이 있어요."],["li","고딕 콰트러포일(사엽 장식) 문양 — 아치 사이사이에 새겨진 장식으로, 국회의사당과 통일감을 주기 위해 넣은 디테일이에요."],["p","실제로 서서 보면, 한쪽엔 웅장한 국회의사당과 빅벤이, 반대쪽엔 런던아이가 보여서 신구 런던을 동시에 담을 수 있는 특별한 위치예요."],["p","📸 사진 찍기 좋은 위치는 다리 중앙, 빅벤 방향을 바라보는 자리예요. 해질 무렵엔 다리와 시계탑이 함께 붉게 물드는 장면을 볼 수 있어요."],["hr",""],["h3","5️⃣ 주요 작품 / 상징적인 요소 소개"],["p","이 다리를 대표하는 건 워즈워스의 소네트 \"Composed upon Westminster Bridge\"예요. 1802년 새벽, 산업화로 분주해지기 시작한 런던을 보며 오히려 그 고요함과 아름다움에 감탄한 시예요."],["p","왜 중요하냐면, 이 시가 당시 산업혁명으로 급변하던 런던의 모습과, 그 안에서도 발견되는 아름다움을 대비적으로 보여주기 때문이에요. 지금은 그 시가 그려낸 들판과 조용함은 사라졌지만, 여전히 이 다리 위에서 도시의 스카이라인을 바라보는 경험 자체는 이어지고 있어요. 처음 오시는 분들은 \"이 다리가 시 한 편의 배경이 됐다\"는 사실만 기억하시면 충분해요."],["hr",""],["h3","6️⃣ 알고 가면 여행이 더 재밌어지는 이야기"],["li","덜 붐비는 시간대: 이른 아침이 워즈워스가 봤던 것과 비슷한 고요함을 느낄 수 있는 시간이에요."],["li","동선 팁: 빅벤 쪽에서 시작해서 다리를 건너 런던아이 쪽으로 이동하는 동선이 자연스러워요."],["li","사람들이 놓치기 쉬운 포인트: 다들 사진만 찍고 지나가시는데, 다리가 왜 초록색인지, 그리고 시 명판이 어디 있는지 아는 사람은 드물어요."],["li","주변 연계 코스: 다리 양 끝으로 국회의사당·빅벤과 런던아이가 있어서 자연스럽게 연결되는 코스예요."],["p","이걸 알고 보시면, 단순히 \"포토스팟\"이 아니라 \"200년 전 시인이 새벽빛 속 런던의 아름다움을 발견했던, 지금도 이어지는 그 시선의 자리\"라는 시선으로 보이실 거예요."]],"reflectiongarden":[["h2","AI 여행 가이드"],["h3","1️⃣ 기본 정보"],["li","장소명: 리플렉션 가든 (Reflection Garden)"],["li","위치: 25 Cannon Street, London EC4M 9AF (세인트 폴 대성당 인근)"],["li","가까운 지하철역: St Paul's역 (도보 몇 분), Mansion House역"],["li","추천 방문 소요 시간: 10~20분"],["li","입장료: 무료 (상시 개방)"],["li","운영 시간: 시즌별로 다름, 방문 시 안내판 확인 권장"],["li","이런 분께 추천: 사진 좋아하는 분, 조용한 휴식 공간 찾는 분, 건축 좋아하는 분, 숨은 명소 발견하는 걸 즐기는 분"],["hr",""],["h3","2️⃣ 한 문장으로 이해하는 기본 소개"],["p","\"평범한 잔디밭이었던 자리가, 물웅덩이 하나로 세인트 폴 대성당을 거꾸로 담아내는 명소가 된 곳\""],["p","런던의 숨은 명소들 중에서도 유독 아는 사람만 아는 곳이에요. 큰 나무들에 완전히 가려져 있어서 길에서는 존재 자체를 알기 어려운데, 안으로 들어서면 도시의 소음이 순식간에 사라지고 세인트 폴 대성당이 물 위에 거꾸로 비치는 장면을 마주하게 돼요."],["hr",""],["h3","3️⃣ 역사와 이 장소만의 특징"],["p","이 자리는 원래 그냥 평범한 잔디와 관목이 있던, 눈에 잘 안 띄는 공간이었어요. 부동산 회사 펨브로크가 이 건물을 재개발하면서, 시티오브런던 시가 추진하는 \"데스티네이션 시티(Destination City)\"라는 비전에 맞춰 이 공간을 완전히 새로운 정원으로 탈바꿈시켰어요."],["p","이 비전은 코로나19 팬데믹 이후 스퀘어 마일(시티오브런던의 별칭)이 단순히 일하는 곳이 아니라 머물고 싶은 곳이 되도록 만들자는 취지였어요. 조경 디자이너 톰 스튜어트-스미스와 물 조형 전문가 앤드류 유잉이 협업해서, 2022년 7월 지금의 모습으로 문을 열었어요. 도시의 콘크리트와 유리 건물 숲 한가운데, 물웅덩이 하나로 자연과 역사를 동시에 담아낸 거예요."],["p","한국으로 치면, 재개발 과정에서 그냥 버려지던 공간을 조경 전문가의 손길로 도심 속 명소로 탈바꿈시킨 셈이에요. 다만 여긴 세인트 폴 대성당이라는 랜드마크의 반영을 활용했다는 점이 독특한 아이디어죠."],["hr",""],["h3","4️⃣ 건축물(공간) 관람 포인트 설명"],["p","정원 자체는 약 1,000㎡ 규모의 작은 공간이에요. 특징은 중앙에 있는 65㎡ 크기의 얕은 반영 풀이에요."],["p","🔍 여기서 꼭 봐야 할 포인트 TOP 3"],["li","오벌 형태의 반영 풀 — 잔잔한 수면 위로 세인트 폴 대성당의 돔이 거꾸로 비치는 게 이 정원의 핵심이에요."],["li","주변을 둘러싼 벤치들 — 도심 직장인들이 점심시간에 앉아서 쉬는 자리인데, 관광객들에겐 조용히 앉아 사진 찍기 좋은 자리이기도 해요."],["li","계절마다 바뀌는 식재 — 새, 박쥐를 위한 서식 공간과 곤충 호텔까지 갖춘 생 function pgId(pg){ const m=(pg||"").match(/([0-9a-f]{32})$/); return m?m[1]:""; }
function nbEsc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function nbContent(pg){ return nbContentByKey(pgId(pg)); }
function nbContentByKey(key){
  const all = NOTION_CONTENT[key];
  if(!all||!all.length) return "";
  // 'AI 여행 가이드' 이후 내용만 표시 (없으면 비움)
  const idx = all.findIndex(r=>r[1] && r[1].trim()==="AI 여행 가이드");
  if(idx<0) return "";
  const rows = all.slice(idx+1);
  if(!rows.length) return "";
  let h='<div class="notion-embed"><div class="ne-h">AI 여행 가이드</div><div class="nb-card"><div class="nb">';
  rows.forEach(r=>{
    const ty=r[0], tx=nbEsc(r[1]), href=r[2];
    if(ty==="hr"){ h+="<hr>"; return; }
    if(!tx) return;
    if(href){ h+=`<p><a href="${href}" target="_blank" rel="noopener">${tx}</a></p>`; return; }
    if(ty==="h1") h+=`<h1>${tx}</h1>`;
    else if(ty==="h2") h+=`<h2>${tx}</h2>`;
    else if(ty==="h3") h+=`<h3>${tx}</h3>`;
    else if(ty==="tg") h+=`<div class="tg">${tx}</div>`;
    else if(ty==="li") h+=`<div class="li">${tx}</div>`;
    else if(ty==="c") h+=`<div class="c">${tx}</div>`;
    else if(ty==="q") h+=`<div class="q">${tx}</div>`;
    else h+=`<p>${tx}</p>`;
  });
  h+="</div></div></div>";
  return h;
}

const SLOT_PREFIX=/^(아침|점심|저녁|야식|브런치|애프터눈티)\s*[—–\-]\s*/;
function nkey(s){ return (s||"").replace(SLOT_PREFIX,"").toLowerCase().replace(/[^0-9a-z가-힣]/g,""); }
function keyMatch(ek, rk){ if(!ek||!rk) return false; if(ek===rk) return true; const a=ek.length<=rk.length?ek:rk, b=ek.length<=rk.length?rk:ek; return a.length>=3 && b.includes(a); }
function findRec(arr, day, e){
  if(e.ref) return arr.find(x=>x.day===day && x.name===e.ref) || null;
  const ek=nkey(e.ttl); if(ek.length<3) return null;
  return arr.find(x=>x.day===day && keyMatch(ek, nkey(x.name))) || null;
}
DAYS.forEach(d=>{
  d.events.forEach(e=>{
    /* 뱃지(예약상태·바우처)·예약시간·비용 = 레코드에서 가져옴.
       비고·운영시간·이동 = 일정탭 원본 유지(레코드가 덮어쓰지 않음) */
    if(e.k==="food"){
      const f=findRec(FOOD, d.n, e);
      if(f){ e.resv=f.resv; if(f.voucher) e.voucher=f.voucher; if(f.menu) e.menu=f.menu; e._rec=f; }
    } else if(e.k==="see" || e.k==="shop"){
      const p=findRec(PLACES, d.n, e);
      if(p){
        e.resv=p.resv;
        if(p.voucher) e.voucher=p.voucher;
        if(p.price) e.price=p.price;
        const tm=(p.time||"").match(/\d{1,2}:\d{2}/); if(p.resv==="ok" && tm) e.rtime=tm[0]+" 예약";
        e._rec=p;
      }
    }
  });
});

const MODE_INFO = { tube:{label:"튜브", icon:TUBE_RD}, bus:{label:"버스", icon:"🚌"}, rail:{label:"기차", icon:RAIL_RD}, boat:{label:"보트", icon:"⛴️"}, walk:{label:"도보", icon:"🚶"}, taxi:{label:"택시", icon:"🚕"}, uber:{label:"우버", icon:"🚕"} };
function parseRoute(t){
  if(!t) return null;
  const parts = t.split(" · "); const head = parts[0]; const tail = parts.slice(1).join(" · ").trim();
  const modeMap={"튜브":"tube","버스":"bus","도보":"walk","보트":"boat","기차":"rail","택시":"taxi","우버":"uber"};
  const alts = head.split("또는").map(s=>s.trim());
  const legs = [];
  alts.forEach(a=>{ const m=a.match(/(튜브|버스|도보|보트|기차|택시|우버)\s*(\d+\s*분)?/); if(m) legs.push({type:modeMap[m[1]], dur:(m[2]||"").replace(/\s/g,"")}); });
  if(!legs.length) return null;
  let path=null, num=null, dist=null;
  if(/→/.test(tail)) path=tail;
  else { const bn=tail.match(/([\d·]+)\s*번/); if(bn) num=bn[1]; const dm=tail.match(/([\d.]+\s*(?:km|m))/); if(dm) dist=dm[1].replace(/\s/g,""); }
  legs.forEach(l=>{ if(l.type==="bus"&&num) l.num=num; });
  return {legs, path, num, dist, alt:alts.length>1};
}
function legHTML(l){
  const mi = MODE_INFO[l.type]||{label:l.type, icon:""};
  const bn = (l.type==="bus"&&l.num) ? l.num.split("·").map(n=>`<span class="busno">${n.trim()}</span>`).join("") : "";
  return `<span class="leg"><span class="modechip">${mi.label}</span>${l.dur?'<span class="dur">'+l.dur+'</span>':''}${bn}</span>`;
}
function routeHTML(i, e){
  const r = parseRoute(e.move);
  if(!r) return `<div class="move-line">${moveSvg}${e.move}</div>`;
  const sep = r.alt ? '<span class="rt-alt">또는</span>' : '<span class="rt-arrow">›</span>';
  const strip = r.legs.map(legHTML).join(sep);
  // 거리(도보/택시)·버스번호는 같은 줄에 인라인, 역 경로(→)만 아랫줄
  let inline=""; if(!r.path && r.dist) inline=r.dist;
  const url = moveLink(i, e.move);
  let h = '<div class="route"><div class="route-strip">'+strip+(inline?'<span class="rt-inline">· '+inline+'</span>':'')+'</div>';
  if(r.path) h += `<div class="rt-path">${r.path}</div>`;
  if(url) h += `<div class="rt-foot"><a class="maplink mini" href="${url}" target="_blank" rel="noopener">지도 ›</a></div>`;
  h += '</div>';
  return h;
}

/* ===== TIME (London now-line) ===== */
function londonParts(){
  const f = new Intl.DateTimeFormat('en-GB',{timeZone:'Europe/London',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false});
  const p={}; f.formatToParts(new Date()).forEach(x=>{ if(x.type!=='literal') p[x.type]=x.value; });
  if(p.hour==='24') p.hour='00'; return p;
}
function londonNowMs(){ const p=londonParts(); return Date.UTC(+p.year,+p.month-1,+p.day,+p.hour,+p.minute); }
function londonHHMM(){ const p=londonParts(); return `${p.hour}:${p.minute}`; }
function parseTimeRange(t){
  if(!t) return null; const m=t.match(/(\d{1,2}):(\d{2})/g); if(!m) return null;
  const toMin=x=>{const[h,mm]=x.split(':').map(Number);return h*60+mm;};
  const s=toMin(m[0]); let e=m[1]?toMin(m[1]):s; if(e<s)e+=1440; return {s,e};
}
const dayMeta = DAYS.map(d=>{
  const DD=parseInt(d.date.split('.')[1],10); const base=Date.UTC(2026,6,DD); let last=0;
  return d.events.map(e=>{ const r=parseTimeRange(e.t); const s=r?r.s:last; const en=r?r.e:s; last=s; return {s:base+s*60000, e:base+en*60000}; });
});
let NOW, NOW_HHMM, MARK;
function computeNow(){
  NOW = londonNowMs(); NOW_HHMM = londonHHMM(); MARK=null;
  outer: for(let i=0;i<DAYS.length;i++){ for(let j=0;j<dayMeta[i].length;j++){ if(NOW<dayMeta[i][j].e){ MARK={d:i,j}; break outer; } } }
  if(!MARK){ const li=DAYS.length-1; MARK={d:li, j:DAYS[li].events.length}; }
}
computeNow();
function nowLineHTML(){ return `<div class="nowline" id="nowmark"><span class="nl-label">지금 ${NOW_HHMM} 런던</span><span class="nl-bar"></span></div>`; }

  let h=`<section class="day-sec" id="day-${i}"><div class="dayhead"><h2>${d.n}일차 · ${d.date} <span class="dow">(${d.dow})</span></h2><div class="theme">${d.theme}</div></div><div class="tl">`;
  d.events.forEach((e,j)=>{
    if(MARK.d===i && MARK.j===j) h+=nowLineHTML();
    const meta=dayMeta[i][j]; const ongoing=meta && NOW>=meta.s && NOW<meta.e;
    let cls=(e.k==="move")?"ev move":"ev"; if(ongoing) cls+=" current";
    const did=(e.k!=="move" && e._rec && e._rec._did) ? e._rec._did : "";
    h+=`<div class="${cls}" data-kind="${e.k}"><div class="card${did?' tap':''}"${did?` onclick="openDetail('${did}')"`:''}>`;
    if(e.k==="move"){
      h+=`<div class="move-head"><span class="time">${e.t}</span><span class="move-title">${dash(e.ttl)}</span></div>`;
      if(e.move) h+=routeHTML(i,e);
      if(e.note) h+=`<div class="note">${noteSvg}<span>${e.note}</span></div>`;
    }else{
      h+=`<div class="time">${e.t}</div><div class="ttl">${e.ico?EI(e.ico)+" ":(KIND_EMOJI[e.k]?EI(KIND_EMOJI[e.k])+" ":"")}${tw(dash(e.ttl))}</div>`;
      const rb=resvBadge(e.resv), vc=e.voucher?vchChip(e.voucher):"";
      if(rb||vc) h+=`<div class="r-badges">${rb} ${vc}</div>`;              // 예약완료 · 바우처
      if(e.move) h+=routeHTML(i,e);                                          // 이동
      if(e.note) h+=`<div class="note">${noteSvg}<span>${e.note}</span></div>`; // 비고
      if(e.menu) h+=`<div class="ev-hours"><span>${forkSvg} ${e.menu}</span></div>`; // 메뉴(식당탭)
      if(e.rtime) h+=`<div class="ev-hours"><span>${ticketSvg} ${e.rtime}</span></div>`; // 예약시간
      if(e.price) h+=`<div class="ev-hours"><span>${tagSvg} ${e.price}</span></div>`;     // 비용
      if(e.hour) h+=`<div class="ev-hours"><span>${clockSvg} ${e.hour}</span></div>`;      // 운영시간
      if(e.subs){ h+='<ul class="sub-list">'; e.subs.forEach(s=>h+=`<li>${s}</li>`); h+='</ul>'; }
      if(e.map) h+=`<div class="card-foot"><a class="maplink" href="${mapUrl(e.map)}" target="_blank" rel="noopener">지도 ›</a></div>`;
    }
    h+='</div></div>';
  });
  if(MARK.d===i && MARK.j>=d.events.length) h+=nowLineHTML();
  h+='</div></section>';
  return h;
}

/* 이미지 라이트박스: 두 손가락 핀치 확대 + 한 손가락 이동 + (확대 안 된 상태)밀어서 닫기 (viewport가 user-scalable=no라 직접 구현) */
function closeLBox(){ const lb=document.getElementById('lb'), im=document.getElementById('lbimg'); lb.classList.remove('open'); lb.style.transition=''; lb.style.background=''; im.style.transition=''; im.style.transform=''; }
(function(){
  const lb=document.getElementById('lb'), im=document.getElementById('lbimg');
  let scale=1, x=0, y=0;              // 현재 변환
  let mode=0;                         // 0 없음, 1 이동(확대시), 2 핀치, 3 밀어서 닫기
  let sDist=0, sScale=1, sx=0, sy=0, sCX=0, sCY=0, dX=0, dY=0, moved=false, t0=0;
  function apply(){ im.style.transform='translate('+x+'px,'+y+'px) scale('+scale+')'; }
  function reset(){ scale=1; x=0; y=0; im.style.transition=''; lb.style.transition=''; lb.style.background=''; apply(); }
  function hyp(t){ return Math.hypot(t[0].clientX-t[1].clientX, t[0].clientY-t[1].clientY); }
  window.openLB=function(src){ im.src=src; reset(); lb.classList.add('open'); };
  lb.addEventListener('touchstart', function(e){
    t0=Date.now(); moved=false; dX=0; dY=0; im.style.transition=''; lb.style.transition='';
    if(e.touches.length===2){ mode=2; sDist=hyp(e.touches)||1; sScale=scale; sx=x; sy=y; }
    else if(e.touches.length===1){ const t=e.touches[0]; sCX=t.clientX; sCY=t.clientY; sx=x; sy=y; mode=(scale>1.02)?1:3; }
  }, {passive:false});
  lb.addEventListener('touchmove', function(e){
    if(mode===2 && e.touches.length===2){ e.preventDefault(); let ns=sScale*(hyp(e.touches)/sDist); ns=Math.max(1,Math.min(5,ns)); scale=ns; if(scale<=1){x=0;y=0;} apply(); moved=true; }
    else if(mode===1 && e.touches.length===1){ e.preventDefault(); const t=e.touches[0]; x=sx+(t.clientX-sCX); y=sy+(t.clientY-sCY); if(Math.abs(t.clientX-sCX)>8||Math.abs(t.clientY-sCY)>8) moved=true; apply(); }
    else if(mode===3 && e.touches.length===1){ e.preventDefault(); const t=e.touches[0]; dX=t.clientX-sCX; dY=t.clientY-sCY; if(Math.hypot(dX,dY)>8) moved=true; x=dX; y=dY; apply(); const f=Math.min(Math.hypot(dX,dY)/520,0.85); lb.style.background='rgba(0,0,0,'+(0.94*(1-f))+')'; }
  }, {passive:false});
  lb.addEventListener('touchend', function(e){
    if(e.touches.length>0) return;
    const dt=Date.now()-t0;
    if(mode===3){
      if(moved){
        const dist=Math.hypot(dX,dY);
        if(dist>120 || (dt<300 && dist>70)){        // 충분히 밀면 → 밀린 방향으로 날아가며 닫힘
          im.style.transition='transform .22s ease'; x=dX*2.4; y=dY*2.4; apply();
          lb.style.transition='background .22s ease'; lb.style.background='rgba(0,0,0,0)';
          setTimeout(closeLBox, 210);
        } else {                                     // 아니면 제자리로
          im.style.transition='transform .22s ease'; lb.style.transition='background .22s ease'; x=0; y=0; apply(); lb.style.background='';
          setTimeout(function(){ im.style.transition=''; lb.style.transition=''; }, 230);
        }
      } else { closeLBox(); }                        // 탭 → 닫기
      mode=0; return;
    }
    if(scale<=1.02){ reset(); }
    const tap = !moved && dt<300;
    if(tap){ if(scale>1.02){ reset(); } else if(!e.target.classList.contains('lb-close')){ closeLBox(); } }
    mode=0;
  }, {passive:true});
  /* 데스크톱: 배경 클릭 시 닫기 */
  lb.addEventListener('click', function(e){ if(e.target!==im && !e.target.classList.contains('lb-close') && scale<=1.02) closeLBox(); });
})();

/* ===== [예약] (식사+장소 중 예약값 있는 것만: 예약완료·예약필요·예약불필요) =====
   투어스팟 등 예약 언급이 없는(resv:null) 항목은 제외. 상세는 일정과 동일한 것을 공유. */
(function(){
  const RES={ok:1,wait:1,free:1};
  const items=[];
  FOOD.forEach(f=>{ if(RES[f.resv]) items.push({t:"food", day:f.day, date:f.date, rec:f}); });
  PLACES.forEach(p=>{ if(RES[p.resv]) items.push({t:"place", day:p.day, date:p.date, rec:p}); });
  items.sort((a,b)=>a.day-b.day); // 같은 날 안에서는 식사 → 장소 순(삽입 순서 유지, 안정 정렬)
  let h=""; let cur=null;
  items.forEach(it=>{
    if(it.day!==cur){ if(cur!==null) h+="</div>"; cur=it.day; h+=`<div class="group"><div class="group-h">${it.day}일차 · ${it.date}</div>`; }
    const id=it.rec._did;
    if(it.t==="food"){
      const f=it.rec; const title=f.name||f.area||"미정"; const ic=f.icon?EI(f.icon)+" ":"";
      h+=`<div class="row tap" onclick="openDetail('${id}')">`;
      if(f.slot) h+=`<div class="r-slot">${slotBadge(f.slot)}</div>`;
      h+=`<div class="r-name">${ic}${tw(title)}</div>`;
      h+=`<div class="r-badges">${resvBadge(f.resv)} ${vchChip(f.voucher)}</div>`;
      let meta=[]; if(f.name&&f.area) meta.push(`<span>${pinSvg} ${f.area}</span>`); if(f.menu) meta.push(`<span>${forkSvg} ${f.menu}</span>`);
      if(meta.length) h+=`<div class="r-meta">${meta.join("")}</div>`;
      if(f.hour) h+=`<div class="r-meta"><span>${clockSvg} 운영 ${f.hour}</span></div>`;
      h+=`</div>`;
    } else {
      const p=it.rec;
      h+=`<div class="row tap" onclick="openDetail('${id}')"><div class="r-name">${EI(p.type)} ${tw(p.name)}</div>`;
      h+=`<div class="r-badges">${resvBadge(p.resv)} ${vchChip(p.voucher)}</div>`;
      const tm=(p.time||"").match(/\d{1,2}:\d{2}/);
      let meta=[]; if(p.resv==="ok" && tm) meta.push(`<span>${ticketSvg} ${tm[0]} 예약</span>`); if(p.price) meta.push(`<span>${tagSvg} ${p.price}</span>`);
      if(meta.length) h+=`<div class="r-meta">${meta.join("")}</div>`;
      if(p.hour) h+=`<div class="r-meta"><span>${clockSvg} 운영 ${p.hour}</span></div>`;
      h+=`</div>`;
    }
  });
  if(cur!==null) h+="</div>";
  document.getElementById("resv-body").innerHTML=h;
})();

const views={plan:document.getElementById("view-plan"), resv:document.getElementById("view-resv"), book:document.getElementById("view-book"), docs:document.getElementById("view-docs"), etc:document.getElementById("view-etc"), detail:document.getElementById("view-detail")};
function showView(v, fromDetail){
  Object.entries(views).forEach(([k,el])=>el.classList.toggle("active", k===v));
  document.querySelectorAll("#nav button").forEach(b=>b.classList.toggle("active", b.dataset.view===v));
  if(!fromDetail && v!=="detail") window.scrollTo({top:0});
}
document.querySelectorAll("#nav button").forEach(b=>{ b.onclick=()=>{ views.detail.classList.remove("active"); resetDV(); prevView=b.dataset.view; showView(b.dataset.view); if(b.dataset.view==="plan") gotoNow(); }; });

/* 인터랙티브 백 스와이프: 왼쪽 가장자리에서 끌면 화면이 손가락을 따라 밀려나고, 충분히 밀면 뒤로 */
const DV=views.detail;
let sX=0, sY=0, sT=0, edge=false, drag=false;
function resetDV(){ DV.style.transition=''; DV.style.transform=''; DV.style.opacity=''; DV.style.boxShadow=''; }
function backDetail(){
  DV.style.transition='transform .3s cubic-bezier(.22,.61,.36,1), opacity .3s ease';
  DV.style.transform='translateX(100%)'; DV.style.opacity='0.4';
  setTimeout(()=>{ closeDetail(); resetDV(); }, 300);
}
document.addEventListener('touchstart',e=>{
  if(!DV.classList.contains('active')||e.touches.length!==1){edge=false;return;}
  sX=e.touches[0].clientX; sY=e.touches[0].clientY; sT=Date.now(); edge=sX<=60; drag=false;
},{passive:true});
document.addEventListener('touchmove',e=>{
  if(!edge||!DV.classList.contains('active'))return;
  const t=e.touches[0], ddx=t.clientX-sX, ddy=t.clientY-sY;
  if(!drag){ if(Math.abs(ddx)>8 && Math.abs(ddx)>Math.abs(ddy)){ drag=true; DV.style.transition='none'; DV.style.boxShadow='-12px 0 28px rgba(0,0,0,.10)'; } else if(Math.abs(ddy)>10){ edge=false; return; } }
  if(drag){ const x=Math.max(0,ddx); DV.style.transform='translateX('+x+'px)'; DV.style.opacity=String(1-Math.min(x/window.innerWidth,1)*0.4); if(e.cancelable)e.preventDefault(); }
},{passive:false});
document.addEventListener('touchend',e=>{
  if(!drag){edge=false;return;}
  drag=false; edge=false;
  const t=e.changedTouches[0], dx=t.clientX-sX, dt=Date.now()-sT, w=window.innerWidth;
  const go = dx > w*0.32 || (dx>70 && dt<350); // 멀리 끌거나 빠르게 튕기면 뒤로
  DV.style.transition='transform .3s cubic-bezier(.22,.61,.36,1), opacity .3s ease';
  if(go){ DV.style.transform='translateX(100%)'; DV.style.opacity='0.4'; setTimeout(()=>{ closeDetail(); resetDV(); },300); }
  else { DV.style.transform='translateX(0)'; DV.style.opacity='1'; setTimeout(resetDV,300); }
},{passive:true});

gotoNow();
</script>
