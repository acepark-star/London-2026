<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1d1d1f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<title>런던 여행 · 2026.07</title>
<link rel="manifest" href="manifest.webmanifest">
<style>
  :root{
    --primary:#0066cc; --primary-focus:#0071e3; --primary-on-dark:#2997ff;
    --ink:#1d1d1f; --ink-80:#333; --ink-48:#7a7a7a;
    --divider-soft:#f0f0f0; --hairline:#e0e0e0; --hairline-a:rgba(0,0,0,.08);
    --canvas:#fff; --parchment:#f5f5f7; --pearl:#fafafc; --tile-dark:#272729;
    --sys-green:#34c759; --sys-orange:#ff9500; --sys-red:#ff3b30;
    --r-sm:8px; --r-md:11px; --r-lg:18px; --r-pill:9999px;
    --safe-b:env(safe-area-inset-bottom,0px);
    --font:-apple-system, BlinkMacSystemFont, system-ui, "SF Pro Text", "Inter", "Apple SD Gothic Neo", sans-serif;
    --font-display:-apple-system, BlinkMacSystemFont, system-ui, "SF Pro Display", "Inter", "Apple SD Gothic Neo", sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{font-family:var(--font); background:var(--parchment); color:var(--ink);
    font-size:17px; line-height:1.47; letter-spacing:-0.374px; -webkit-font-smoothing:antialiased;
    padding-bottom:calc(66px + var(--safe-b));}
  button{font-family:inherit;}
  a{color:var(--primary); text-decoration:none;}
  /* iOS standalone 상태바 영역을 #1d1d1f로 고정 */
  .sb{position:fixed; top:0; left:0; right:0; height:env(safe-area-inset-top); background:#1d1d1f; z-index:200; pointer-events:none;}

  header{position:sticky; top:0; z-index:30; overflow:hidden;
    background:#1d1d1f url('header.jpg') center/cover no-repeat;
    border-bottom:1px solid var(--hairline-a); padding:16px 20px 16px; padding-top:calc(env(safe-area-inset-top) + 16px);
    min-height:120px; display:flex; flex-direction:column; justify-content:flex-end;}
  header::after{content:""; position:absolute; inset:0; z-index:0;
    background:linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0) 40%, rgba(0,0,0,.5) 100%);}
  header > *{position:relative; z-index:1;}
  header .eyebrow{font-size:12px; line-height:1; letter-spacing:-0.12px; color:rgba(255,255,255,.85); font-weight:700;}
  header h1{font-family:var(--font-display); margin:5px 0 0; font-size:30px; font-weight:600; line-height:1.07; letter-spacing:-0.5px; color:#fff; text-shadow:0 1px 4px rgba(0,0,0,.35);}
  header .dates{font-size:14px; line-height:1.43; letter-spacing:-0.224px; color:rgba(255,255,255,.92); margin-top:3px; text-shadow:0 1px 3px rgba(0,0,0,.3);}

  main{padding:16px 16px 28px; max-width:100%; margin:0;}
  .view{display:none; animation:fade .28s ease;}
  .view.active{display:block;}
  /* 콘텐츠가 짧은 탭(기타 등)에서도 화면을 채워, 하단 고정 탭바가 위로 떠 보이는 현상 방지 */
  #view-plan.active, #view-resv.active, #view-book.active, #view-docs.active, #view-etc.active{min-height:calc(100dvh - 170px);}
  @keyframes fade{from{opacity:0; transform:translateY(5px);} to{opacity:1; transform:none;}}

  /* day chips */
  .daybar{position:sticky; top:0; z-index:20; margin:-16px -16px 16px; padding:12px 16px;
    background:var(--parchment); border-bottom:1px solid var(--hairline-a); display:flex; gap:8px; overflow-x:auto; scrollbar-width:none;}
  .daybar::-webkit-scrollbar{display:none;}
  .day-sec{scroll-margin-top:var(--stick, 150px);}
  .day-sec:not(:first-child){margin-top:10px;}
  .chip{flex:0 0 auto; border:1px solid var(--hairline); background:var(--canvas); color:var(--ink-80);
    padding:8px 14px; border-radius:var(--r-pill); cursor:pointer; min-width:54px;
    display:flex; flex-direction:column; align-items:center; line-height:1.1; transition:transform .12s ease;}
  .chip:active{transform:scale(.95);}
  .chip b{font-size:15px; font-weight:600; letter-spacing:-0.374px; color:var(--ink);}
  .chip small{font-size:11px; letter-spacing:-0.12px; color:var(--ink-48); font-weight:400; margin-top:1px;}
  .chip.active{background:var(--ink); border-color:var(--ink);}
  .chip.active b,.chip.active small{color:#fff;}

  .dayhead{position:sticky; top:var(--stick,150px); z-index:15; background:var(--parchment); margin:0 -16px 14px; padding:11px 16px; display:flex; align-items:baseline; gap:9px; flex-wrap:wrap;}
  .dayhead h2{font-family:var(--font-display); font-size:19px; font-weight:600; letter-spacing:-0.4px; line-height:1.2; margin:0;}
  .dayhead .dow{color:var(--ink-48); font-weight:400;}
  .dayhead .theme{font-size:13.5px; letter-spacing:-0.2px; color:var(--primary); font-weight:600; margin:0;}
  .dayhead.stuck{box-shadow:0 6px 8px -7px rgba(0,0,0,.10); border-bottom:1px solid var(--hairline-a);}

  /* timeline */
  .tl{position:relative; padding-left:18px;}
  .tl::before{content:""; position:absolute; left:5px; top:8px; bottom:8px; width:1.5px; background:var(--hairline);}
  .ev{position:relative; margin-bottom:10px;}
  .ev::before{content:""; position:absolute; left:-17px; top:18px; width:9px; height:9px; border-radius:50%; background:var(--canvas); border:1.5px solid var(--ink-48);}
  .ev[data-kind="food"]::before{border-color:var(--sys-orange);}
  .ev[data-kind="see"]::before{border-color:var(--primary);}
  .ev[data-kind="shop"]::before{border-color:var(--primary);}
  .ev[data-kind="move"]::before{background:var(--ink-48); border-color:var(--ink-48);}
  .ev[data-kind="rest"]::before{border-color:var(--sys-green);}
  .ev[data-kind="flight"]::before{background:var(--ink); border-color:var(--ink);}
  .nowline{position:relative; display:flex; align-items:center; gap:8px; margin:2px 0 12px;}
  .nowline::before{content:""; position:absolute; left:-17px; top:50%; transform:translateY(-50%); width:11px; height:11px; border-radius:50%; background:var(--sys-red); box-shadow:0 0 0 3px rgba(255,59,48,.18); animation:pulse 1.6s ease-in-out infinite;}
  .nowline .nl-label{font-size:12px; font-weight:700; letter-spacing:-0.08px; color:var(--sys-red); white-space:nowrap;}
  .nowline .nl-bar{flex:1; height:2px; border-radius:2px; background:var(--sys-red); animation:pulse 1.6s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;} 50%{opacity:.32;}}
  .ev.current .card{box-shadow:0 0 0 2px rgba(255,59,48,.5); border-color:transparent;}

  .card{background:var(--canvas); border:1px solid var(--hairline-a); border-radius:var(--r-lg); padding:14px 16px;}
  .card.tap{cursor:pointer; position:relative; transition:transform .12s ease;}
  .card.tap:active{transform:scale(.99);}
  .card.tap::after{content:"›"; position:absolute; right:14px; top:11px; color:#c7c7cc; font-size:20px; line-height:1;}
  .card.tap .ttl{padding-right:20px;}
  .ev.move .card{background:transparent; border:none; padding:5px 15px;}
  .ev.move::before{top:10px;}
  .ev .move-head{display:flex; align-items:baseline; gap:8px; flex-wrap:wrap;}
  .ev .move-head .move-title{font-size:14px; font-weight:600; letter-spacing:-0.224px; color:var(--ink-48);}
  .ev .time{font-size:13px; font-weight:600; letter-spacing:-0.08px; color:var(--ink-48); font-variant-numeric:tabular-nums;}
  .ev .ttl{font-size:17px; font-weight:600; letter-spacing:-0.374px; line-height:1.3; margin:6px 0 0;}
  .ev .note{font-size:14px; letter-spacing:-0.224px; line-height:1.43; color:var(--ink-48); margin-top:8px; display:flex; align-items:flex-start; gap:6px;}
  .ev .note svg{flex:0 0 auto; margin-top:3px; opacity:.7;}
  .ev .r-badges{display:flex; flex-wrap:wrap; gap:6px; margin-top:9px;}
  .ev .move-line{font-size:13px; letter-spacing:-0.08px; color:var(--ink-48); display:flex; align-items:center; gap:6px; margin-top:2px;}
  .ev .move-line svg{flex:0 0 auto; opacity:.7;}
  .ev .kico{display:inline-flex; align-items:center; color:var(--ink-48);}
  .ev-hours{font-size:13px; color:var(--ink-48); margin-top:8px;}
  .ev-hours span{display:inline-flex; align-items:center; gap:5px;}
  .card-foot{display:flex; justify-content:flex-end; margin-top:8px;}
  .card-foot .maplink{margin-top:0;}

  /* badges */
  .badge{font-size:11px; font-weight:600; letter-spacing:-0.08px; padding:3px 9px; border-radius:var(--r-pill); white-space:nowrap; line-height:1.3;}
  .b-ok{background:rgba(52,199,89,.14); color:#1c7a3c;}
  .b-wait{background:rgba(255,149,0,.16); color:#9a5b00;}
  .b-free{background:var(--pearl); color:var(--ink-48); border:1px solid var(--hairline-a);}
  .b-hour{background:var(--pearl); color:var(--ink-80); border:1px solid var(--hairline-a);}

  .maplink{display:inline-flex; align-items:center; gap:5px; margin-top:10px; font-size:14px; font-weight:600;
    letter-spacing:-0.224px; color:var(--primary); background:rgba(0,102,204,.08); padding:7px 13px; border-radius:var(--r-pill); transition:transform .12s ease;}
  .maplink:active{transform:scale(.95);}
  .maplink.mini{margin-top:0; padding:5px 11px; font-size:13px; flex:0 0 auto;}
  .sub-list{margin:8px 0 0; padding:0; list-style:none;}
  .sub-list li{font-size:14px; letter-spacing:-0.224px; color:var(--ink-48); padding:3px 0 3px 16px; position:relative; line-height:1.43;}
  .sub-list li::before{content:""; position:absolute; left:4px; top:11px; width:4px; height:4px; border-radius:50%; background:var(--hairline);}

  /* route strip */
  .route{margin-top:6px;}
  .route-strip{display:flex; align-items:center; gap:7px; flex-wrap:wrap;}
  .leg{display:inline-flex; align-items:center; gap:5px; font-size:13px; font-weight:600; letter-spacing:-0.1px; color:var(--ink);}
  .leg .dur{color:var(--ink-48); font-weight:600;}
  .rd{display:inline-flex; flex:0 0 auto;}
  .busnum{background:#DC241F; color:#fff; font-size:12px; font-weight:800; padding:2px 8px; border-radius:6px; white-space:nowrap;}
  .modechip{display:inline-flex; align-items:center; gap:4px;}
  .busno{display:inline-flex; align-items:center; justify-content:center; min-width:20px; padding:1px 6px; border-radius:5px; background:#d1141e; color:#fff; font-size:12px; font-weight:700; letter-spacing:-0.2px; line-height:1.55;}
  /* 이모지 대체 라인 아이콘 (제목 앞·이동) — 통일 컬러 */
  .ei{display:inline-flex; align-items:center; justify-content:center; color:var(--ink); vertical-align:middle; position:relative; top:-1px; margin-right:3px;}
  .np{white-space:nowrap;}
  .ei svg{width:19px; height:19px;}
  .modechip .ei svg{width:15px; height:15px;}
  .ei-food svg{width:15px; height:15px;}
  .ei-show{color:var(--primary);}
  .ei-show svg{width:15px; height:15px;}
  .ei-stay{color:var(--primary);}
  .ei-stay svg{width:16px; height:16px;}
  .ei-air{color:var(--primary);}
  .ei-air svg{width:16px; height:16px;}
  .ei-train{color:var(--primary);}
  .ei-train svg{width:15px; height:15px;}
  .ei-doc{color:var(--primary);}
  .ei-doc svg{width:15px; height:15px;}
  .ei-etc{color:var(--primary);}
  .ei-etc svg{width:15px; height:15px;}
  .ei-museum{color:var(--primary);}
  .ei-rest{color:var(--ink-48);}
  .ei-tea{color:#e07a00;}
  .ei-museum svg, .ei-rest svg, .ei-tea svg{width:15px; height:15px;}
  .ei-rest svg{width:17px; height:17px;}
  .detail-hd h2 .ei svg{width:21px; height:21px;}
  .detail-hd h2 .ei{top:-3px;}
  .ei-pin{color:var(--primary);}
  .ei-food{color:#e07a00;}
  .rt-inline{color:var(--ink-48); font-size:13px; font-weight:600;}
  .rt-arrow{color:var(--ink-48); font-size:13px; font-weight:600;}
  .rt-alt{color:var(--ink-48); font-size:12px; font-weight:600; padding:0 2px;}
  .rt-path{font-size:13px; color:var(--ink-48); margin-top:6px; letter-spacing:-0.1px; line-height:1.4;}
  .rt-foot{display:flex; align-items:center; justify-content:flex-end; margin-top:8px;}

  /* sections (food / places / accom) */
  .group{margin-bottom:24px;}
  .group-h{font-size:14px; font-weight:600; letter-spacing:-0.224px; color:var(--ink-48); margin:0 4px 10px; display:flex; align-items:center; gap:8px;}
  .group-h .cnt{font-size:12px; color:var(--ink-48); font-weight:400;}
  .row{background:var(--canvas); border:1px solid var(--hairline-a); border-radius:var(--r-lg); padding:16px; margin-bottom:10px; position:relative;}
  .row.tap{cursor:pointer; transition:transform .12s ease;}
  .row.tap:active{transform:scale(.985);}
  .row.tap::after{content:"›"; position:absolute; right:16px; top:50%; transform:translateY(-50%); color:#c7c7cc; font-size:22px; line-height:1;}
  .row .r-top{display:flex; align-items:flex-start; justify-content:space-between; gap:8px;}
  .row .r-slot{margin-bottom:9px;}
  .row .r-name{font-size:16.5px; font-weight:600; letter-spacing:-0.32px; line-height:1.34; padding-right:24px;}
  .row .r-badges{display:flex; flex-wrap:wrap; gap:6px; margin-top:9px;}
  .row .r-meta{font-size:14px; letter-spacing:-0.224px; color:var(--ink-48); margin-top:8px; display:flex; flex-wrap:wrap; gap:6px 14px; line-height:1.45;}
  .row .r-meta span{display:inline-flex; align-items:center; gap:5px;}
  .row .r-foot{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-top:11px;}
  .pill{font-size:12px; background:var(--pearl); color:var(--ink-48); padding:4px 11px; border-radius:var(--r-pill); font-weight:500; border:1px solid var(--hairline-a); letter-spacing:-0.08px;}
  /* 시간대 뱃지: 무채색(라벨) — 의미색은 예약 상태 뱃지에만 */
  .slot{font-size:11px; font-weight:700; letter-spacing:-0.08px; padding:3px 10px; border-radius:var(--r-pill); white-space:nowrap; line-height:1.3; background:#eceef1; color:var(--ink-48);}
  .slot.am,.slot.lunch,.slot.dinner,.slot.night,.slot.tea{background:#eceef1; color:var(--ink-48);}
  .slot.alt{background:var(--pearl); color:var(--ink-48); border:1px solid var(--hairline-a);}
  .vch{display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:700; letter-spacing:-0.08px; padding:3px 9px; border-radius:var(--r-pill); background:rgba(0,102,204,.10); color:var(--primary); white-space:nowrap;}
  .docs-intro{font-size:13.5px; line-height:1.5; letter-spacing:-0.2px; color:var(--ink-48); margin:2px 4px 16px;}
  .doc-row{display:flex; align-items:center; justify-content:space-between; gap:12px; background:var(--canvas); border:1px solid var(--hairline-a); border-radius:14px; padding:13px 15px; margin-bottom:8px;}
  .doc-row .dl{font-size:15px; font-weight:500; letter-spacing:-0.3px; line-height:1.32;}
  .doc-row .ds{font-size:12.5px; font-weight:400; color:var(--ink-48); margin-top:2px;}
  .doc-open{flex:0 0 auto; display:inline-flex; align-items:center; gap:5px; font-size:13px; font-weight:600; letter-spacing:-0.1px; color:var(--primary); background:rgba(0,102,204,.10); border:none; border-radius:var(--r-pill); padding:8px 14px; cursor:pointer;}
  .doc-open:active{background:rgba(0,102,204,.2);}
  .doc-todo{flex:0 0 auto; font-size:12px; font-weight:500; color:var(--ink-48); background:var(--pearl); border:1px solid var(--hairline-a); border-radius:var(--r-pill); padding:6px 11px; white-space:nowrap;}

  /* accom / flight cards */
  .info-card{background:var(--canvas); border:1px solid var(--hairline-a); border-radius:var(--r-lg); padding:18px; margin-bottom:12px;}
  .info-card .ic-h{display:flex; align-items:center; gap:9px; font-size:18px; font-weight:700; letter-spacing:-0.4px;}
  .info-card .ic-sub{font-size:13px; color:var(--ink-48); margin-top:5px; font-weight:600;}
  .info-card .ic-meta{margin-top:4px; padding-bottom:16px; font-size:13px; color:var(--ink-48); font-weight:600; line-height:1.7; letter-spacing:-0.12px;}
  .ai-sec{margin-bottom:24px;}
  .ai-sec .ai-h{font-size:17px; font-weight:700; letter-spacing:-0.3px; margin:0 2px 10px;}
  .ai-img{width:100%; border:1px solid var(--hairline-a); border-radius:var(--r-md); display:block; margin-bottom:8px; background:#fff; cursor:zoom-in;}
  .ai-empty{color:var(--ink-48); font-size:14px; padding:10px 2px;}
  /* image lightbox */
  .lb{position:fixed; inset:0; z-index:300; background:rgba(0,0,0,.94); display:none; overflow:hidden; touch-action:none;}
  .lb.open{display:flex; align-items:center; justify-content:center;}
  .lb img{max-width:100%; max-height:100%; height:auto; touch-action:none; transform-origin:center center; will-change:transform; -webkit-user-select:none; user-select:none; -webkit-user-drag:none;}
  .lb-close{position:fixed; top:max(12px,calc(env(safe-area-inset-top) + 4px)); right:14px; z-index:301; color:#fff; font-size:22px; line-height:38px; text-align:center; background:rgba(0,0,0,.45); border:none; width:38px; height:38px; border-radius:50%; cursor:pointer;}
  .kv{display:flex; gap:10px; padding:16px 0; border-top:1px solid var(--hairline-a); font-size:14.5px; line-height:1.5;}
  .kv:first-of-type{margin-top:0;}
  .kv .k{flex:0 0 76px; color:var(--ink-48); font-weight:600; letter-spacing:-0.2px;}
  .kv .v{flex:1; color:var(--ink); letter-spacing:-0.2px;}
  .flight-leg{display:flex; align-items:center; gap:12px; padding:16px 0; border-top:1px solid var(--hairline-a);}
  .flight-leg:first-of-type{margin-top:0;}
  .flight-leg .fl-end{text-align:center; min-width:54px;}
  .flight-leg .fl-time{font-size:18px; font-weight:700; letter-spacing:-0.4px; font-variant-numeric:tabular-nums;}
  .flight-leg .fl-code{font-size:11px; color:var(--ink-48); font-weight:600; margin-top:1px;}
  .flight-leg .fl-mid{flex:1; text-align:center; color:var(--ink-48); font-size:11px;}
  .flight-leg .fl-line{height:1.5px; background:var(--hairline); position:relative; margin:5px 4px;}
  .flight-leg .fl-line::after{content:"✈"; position:absolute; right:-2px; top:-8px; font-size:12px; color:var(--primary);}

  /* checklist */
  .acc{background:var(--canvas); border:1px solid var(--hairline-a); border-radius:var(--r-lg); margin-bottom:10px; overflow:hidden;}
  .acc-h{display:flex; align-items:center; justify-content:space-between; padding:16px; cursor:pointer; user-select:none;}
  .acc-h .lt{font-size:17px; font-weight:600; letter-spacing:-0.374px; display:flex; align-items:center; gap:9px;}
  .acc-h .prog{font-size:13px; color:var(--ink-48); font-weight:400; font-variant-numeric:tabular-nums;}
  .acc-h .arr{transition:transform .22s ease; color:var(--ink-48); font-size:20px; line-height:1;}
  .acc.open .acc-h .arr{transform:rotate(90deg);}
  .acc-b{display:none; padding:0 16px 8px;}
  .acc.open .acc-b{display:block;}
  .chk{display:flex; align-items:flex-start; gap:12px; padding:11px 2px; border-top:1px solid var(--hairline-a); cursor:pointer;}
  .chk:first-child{border-top:none;}
  .chk input{appearance:none; -webkit-appearance:none; width:22px; height:22px; border:1.5px solid var(--hairline); border-radius:50%; margin:0; flex:0 0 auto; position:relative; cursor:pointer; transition:.15s; background:var(--canvas);}
  .chk input:checked{background:var(--sys-green); border-color:var(--sys-green);}
  .chk input:checked::after{content:""; position:absolute; left:7px; top:3px; width:5px; height:10px; border:solid #fff; border-width:0 2px 2px 0; transform:rotate(45deg);}
  .chk span{font-size:16px; letter-spacing:-0.3px; line-height:1.4; padding-top:1px;}
  .chk input:checked + span{color:var(--ink-48); text-decoration:line-through;}
  .reset{display:block; width:100%; margin-top:8px; padding:13px; background:var(--canvas); border:1px solid var(--hairline-a); border-radius:var(--r-md); color:var(--primary); font-size:15px; font-weight:600; cursor:pointer; transition:transform .12s ease;}
  .reset:active{transform:scale(.97);}

  /* detail page — full-screen overlay (covers header, tab bar stays) */
  #view-detail{position:fixed; left:0; right:0; top:0; bottom:0; z-index:35; background:var(--parchment);
    overflow-y:auto; -webkit-overflow-scrolling:touch; will-change:transform;
    padding:6px 16px calc(82px + var(--safe-b)); padding-top:max(16px,calc(env(safe-area-inset-top) + 4px));}
