<style>
  /* ===== Apple design tokens (from awesome-design-md/apple) ===== */
  :root{
    /* color */
    --primary:#0066cc;          /* Action Blue */
    --primary-focus:#0071e3;
    --primary-on-dark:#2997ff;  /* Sky Link Blue */
    --ink:#1d1d1f;
    --ink-80:#333333;
    --ink-48:#7a7a7a;
    --divider-soft:#f0f0f0;
    --hairline:#e0e0e0;
    --hairline-a:rgba(0,0,0,.08);
    --canvas:#ffffff;
    --parchment:#f5f5f7;
    --pearl:#fafafc;
    --tile-dark:#272729;
    /* iOS system colors for functional status only */
    --sys-green:#34c759;
    --sys-orange:#ff9500;
    /* radius */
    --r-sm:8px; --r-md:11px; --r-lg:18px; --r-pill:9999px;
    /* spacing */
    --s-xs:8px; --s-sm:12px; --s-md:17px; --s-lg:24px; --s-xl:32px;
    --safe-b:env(safe-area-inset-bottom,0px);
    /* SF Pro on Apple platforms, Inter elsewhere */
    --font:-apple-system, BlinkMacSystemFont, system-ui, "SF Pro Text", "Inter", "Apple SD Gothic Neo", sans-serif;
    --font-display:-apple-system, BlinkMacSystemFont, system-ui, "SF Pro Display", "Inter", "Apple SD Gothic Neo", sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:var(--font);
    background:var(--parchment); color:var(--ink);
    font-size:17px; line-height:1.47; letter-spacing:-0.374px;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    padding-bottom:calc(64px + var(--safe-b));
  }
  button{font-family:inherit;}
  a{color:var(--primary); text-decoration:none;}

  /* ===== Header (large-title, Apple "tight") ===== */
  header{
    position:sticky; top:0; z-index:30;
    background:rgba(245,245,247,.82);
    -webkit-backdrop-filter:saturate(180%) blur(20px);
    backdrop-filter:saturate(180%) blur(20px);
    border-bottom:1px solid var(--hairline-a);
    padding:14px 20px 12px; padding-top:max(14px,env(safe-area-inset-top));
  }
  header .eyebrow{font-size:12px; line-height:1; letter-spacing:-0.12px; color:var(--ink-48); font-weight:600;}
  header h1{
    font-family:var(--font-display);
    margin:5px 0 0; font-size:30px; font-weight:600; line-height:1.07; letter-spacing:-0.5px;
  }
  header .dates{font-size:14px; line-height:1.43; letter-spacing:-0.224px; color:var(--ink-48); margin-top:3px;}

  main{padding:16px 16px 28px; max-width:560px; margin:0 auto;}
  .view{display:none; animation:fade .28s ease;}
  .view.active{display:block;}
  @keyframes fade{from{opacity:0; transform:translateY(5px);} to{opacity:1; transform:none;}}

  /* ===== Day selector — iOS segmented / pill chips ===== */
  .daybar{
    position:sticky; top:0; z-index:20; margin:-16px -16px 16px; padding:12px 16px 12px;
    background:linear-gradient(var(--parchment) 72%, transparent);
    display:flex; gap:8px; overflow-x:auto; scrollbar-width:none;
  }
  .daybar::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto; border:1px solid var(--hairline); background:var(--canvas); color:var(--ink-80);
    padding:8px 14px; border-radius:var(--r-pill); cursor:pointer; min-width:54px;
    display:flex; flex-direction:column; align-items:center; line-height:1.1;
    transition:transform .12s ease;
  }
  .chip:active{transform:scale(0.95);}
  .chip b{font-size:15px; font-weight:600; letter-spacing:-0.374px; color:var(--ink);}
  .chip small{font-size:11px; letter-spacing:-0.12px; color:var(--ink-48); font-weight:400; margin-top:1px;}
  .chip.active{background:var(--ink); border-color:var(--ink);}
  .chip.active b, .chip.active small{color:#fff;}

  /* ===== Day head ===== */
  .dayhead{margin:2px 2px 16px;}
  .dayhead h2{font-family:var(--font-display); font-size:22px; font-weight:600; letter-spacing:-0.4px; line-height:1.15; margin:0;}
  .dayhead .dow{color:var(--ink-48); font-weight:400;}
  .dayhead .theme{font-size:15px; letter-spacing:-0.224px; color:var(--primary); font-weight:600; margin-top:3px;}

  /* ===== Timeline ===== */
  .tl{position:relative; padding-left:18px;}
  .tl::before{content:""; position:absolute; left:5px; top:8px; bottom:8px; width:1.5px; background:var(--hairline);}
  .ev{position:relative; margin-bottom:10px;}
  .ev::before{content:""; position:absolute; left:-17px; top:18px; width:9px; height:9px; border-radius:50%; background:var(--canvas); border:1.5px solid var(--ink-48);}
  .ev[data-kind="food"]::before{border-color:var(--sys-orange);}
  .ev[data-kind="see"]::before{border-color:var(--primary);}
  .ev[data-kind="shop"]::before{border-color:var(--primary);}
  .ev[data-kind="move"]::before{background:var(--ink-48); border-color:var(--ink-48);}
  .ev[data-kind="rest"]::before{border-color:var(--sys-green);}
  .ev[data-kind="flight"]::before{background:var(--ink); border-color:var(--ink);}

  .card{background:var(--canvas); border:1px solid var(--hairline-a); border-radius:var(--r-lg); padding:13px 15px;}
  .ev.move .card{background:transparent; border:none; padding:5px 15px;}
  .ev .time{font-size:13px; font-weight:600; letter-spacing:-0.08px; color:var(--ink-48); font-variant-numeric:tabular-nums;}
  .ev .ttl{font-size:17px; font-weight:600; letter-spacing:-0.374px; line-height:1.24; margin:2px 0 0; display:flex; align-items:center; gap:7px; flex-wrap:wrap;}
  .ev .note{font-size:14px; letter-spacing:-0.224px; line-height:1.43; color:var(--ink-48); margin-top:4px;}
  .ev .move-line{font-size:13px; letter-spacing:-0.08px; color:var(--ink-48); display:flex; align-items:center; gap:6px; margin-top:2px;}
  .ev .move-line svg{flex:0 0 auto; opacity:.7;}

  /* badges / chips */
  .badge{font-size:11px; font-weight:600; letter-spacing:-0.08px; padding:3px 9px; border-radius:var(--r-pill); white-space:nowrap; line-height:1.3;}
  .b-ok{background:rgba(52,199,89,.14); color:#1c7a3c;}
  .b-wait{background:rgba(255,149,0,.16); color:#9a5b00;}
  .b-free{background:var(--pearl); color:var(--ink-48); border:1px solid var(--hairline-a);}
  .b-hour{background:var(--pearl); color:var(--ink-80); border:1px solid var(--hairline-a);}

  .maplink{
    display:inline-flex; align-items:center; gap:5px; margin-top:10px;
    font-size:14px; font-weight:600; letter-spacing:-0.224px; color:var(--primary);
    background:rgba(0,102,204,.08); padding:7px 13px; border-radius:var(--r-pill);
    transition:transform .12s ease;
  }
  .maplink:active{transform:scale(0.95);}
  .sub-list{margin:8px 0 0; padding:0; list-style:none;}
  .sub-list li{font-size:14px; letter-spacing:-0.224px; color:var(--ink-48); padding:3px 0 3px 16px; position:relative; line-height:1.43;}
  .sub-list li::before{content:""; position:absolute; left:4px; top:11px; width:4px; height:4px; border-radius:50%; background:var(--hairline);}

  /* ===== Sections (food / book) ===== */
  .group{margin-bottom:24px;}
  .group-h{font-size:14px; font-weight:600; letter-spacing:-0.224px; color:var(--ink-48); margin:0 4px 10px; display:flex; align-items:center; gap:8px;}
  .group-h .cnt{font-size:12px; color:var(--ink-48); font-weight:400;}
  .row{background:var(--canvas); border:1px solid var(--hairline-a); border-radius:var(--r-lg); padding:14px 15px; margin-bottom:9px;}
  .row .r-top{display:flex; align-items:flex-start; justify-content:space-between; gap:8px;}
  .row .r-name{font-size:17px; font-weight:600; letter-spacing:-0.374px; line-height:1.24; display:flex; gap:7px; align-items:center; flex-wrap:wrap;}
  .row .r-meta{font-size:14px; letter-spacing:-0.224px; color:var(--ink-48); margin-top:5px; display:flex; flex-wrap:wrap; gap:5px 14px; line-height:1.43;}
  .row .r-meta span{display:inline-flex; align-items:center; gap:5px;}
  .row .r-foot{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-top:11px;}
  .pill{font-size:12px; background:var(--pearl); color:var(--ink-48); padding:4px 11px; border-radius:var(--r-pill); font-weight:500; border:1px solid var(--hairline-a); letter-spacing:-0.08px;}

  /* ===== Checklist (iOS grouped list) ===== */
  .acc{background:var(--canvas); border:1px solid var(--hairline-a); border-radius:var(--r-lg); margin-bottom:10px; overflow:hidden;}
  .acc-h{display:flex; align-items:center; justify-content:space-between; padding:15px 16px; cursor:pointer; user-select:none;}
  .acc-h .lt{font-size:17px; font-weight:600; letter-spacing:-0.374px; display:flex; align-items:center; gap:9px;}
  .acc-h .prog{font-size:13px; color:var(--ink-48); font-weight:400; font-variant-numeric:tabular-nums;}
  .acc-h .arr{transition:transform .22s ease; color:var(--ink-48); font-size:20px; line-height:1;}
  .acc.open .acc-h .arr{transform:rotate(90deg);}
  .acc-b{display:none; padding:0 16px 8px;}
  .acc.open .acc-b{display:block;}
  .chk{display:flex; align-items:flex-start; gap:12px; padding:11px 2px; border-top:1px solid var(--hairline-a); cursor:pointer;}
  .chk:first-child{border-top:none;}
  .chk input{appearance:none; -webkit-appearance:none; width:22px; height:22px; border:1.5px solid var(--hairline); border-radius:50%; margin:0; flex:0 0 auto; position:relative; cursor:pointer; transition:.15s; background:var(--canvas);}
  .chk input:checked{background:var(--sys-green); border-color:var(--sys-green);}
  .chk input:checked::after{content:""; position:absolute; left:7px; top:3px; width:5px; height:10px; border:solid #fff; border-width:0 2px 2px 0; transform:rotate(45deg);}
  .chk span{font-size:16px; letter-spacing:-0.3px; line-height:1.4; padding-top:1px;}
  .chk input:checked + span{color:var(--ink-48); text-decoration:line-through;}
  .reset{display:block; width:100%; margin-top:8px; padding:13px; background:var(--canvas); border:1px solid var(--hairline-a); border-radius:var(--r-md); color:var(--primary); font-size:15px; font-weight:600; letter-spacing:-0.224px; cursor:pointer; transition:transform .12s ease;}
  .reset:active{transform:scale(0.97);}

  /* ===== Bottom nav — frosted ===== */
  nav{
    position:fixed; left:0; right:0; bottom:0; z-index:40;
    background:rgba(255,255,255,.82);
    -webkit-backdrop-filter:saturate(180%) blur(20px);
    backdrop-filter:saturate(180%) blur(20px);
    border-top:1px solid var(--hairline-a);
    display:flex; padding-bottom:var(--safe-b);
  }
  nav button{flex:1; background:none; border:none; padding:8px 0 7px; display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--ink-48); cursor:pointer; transition:transform .12s ease;}
  nav button:active{transform:scale(0.92);}
  nav button.active{color:var(--primary);}
  nav button .lbl{font-size:11px; font-weight:500; letter-spacing:-0.08px;}
  nav button svg{width:24px; height:24px;}
  .empty{text-align:center; color:var(--ink-48); font-size:15px; padding:32px 0;}
</style>
</head>

/* ---------- PLAN ---------- */
const daybar = document.getElementById("daybar");
const planBody = document.getElementById("plan-body");
DAYS.forEach((d,i)=>{
  const c = document.createElement("div");
  c.className = "chip" + (i===0?" active":"");
  c.innerHTML = `<b>${d.n}일</b><small>${d.date}</small>`;
  c.onclick = ()=>selectDay(i);
  daybar.appendChild(c);
});
function selectDay(i){
  [...daybar.children].forEach((c,j)=>c.classList.toggle("active", j===i));
  const d = DAYS[i];
  let h = `<div class="dayhead"><h2>${d.n}일차 · ${d.date} <span class="dow">(${d.dow})</span></h2><div class="theme">${d.theme}</div></div>`;
  h += '<div class="tl">';
  d.events.forEach(e=>{
    const cls = (e.k==="move")?"ev move":"ev";
    h += `<div class="${cls}" data-kind="${e.k}"><div class="card">`;
    if(e.k==="move"){
      h += `<div class="time">${e.t}</div>`;
      h += `<div style="font-size:14px;font-weight:600;letter-spacing:-0.224px;color:var(--ink-48);margin-top:1px">${e.ttl}</div>`;
      if(e.move) h += `<div class="move-line">${moveSvg}${e.move}</div>`;
    }else{
      h += `<div class="time">${e.t}</div>`;
      h += `<div class="ttl">${KIND_EMOJI[e.k]?KIND_EMOJI[e.k]+" ":""}${e.ttl} ${resvBadge(e.resv)} ${e.hour?'<span class="badge b-hour">'+e.hour+'</span>':''}</div>`;
      if(e.note) h += `<div class="note">${e.note}</div>`;
      if(e.move) h += `<div class="move-line" style="margin-top:6px">${moveSvg}${e.move}</div>`;
      if(e.subs){ h += '<ul class="sub-list">'; e.subs.forEach(s=>h+=`<li>${s}</li>`); h += '</ul>'; }
      if(e.map) h += `<a class="maplink" href="${mapUrl(e.map)}" target="_blank" rel="noopener">지도에서 보기 ›</a>`;
    }
    h += '</div></div>';
  });
  h += '</div>';
  planBody.innerHTML = h;
  window.scrollTo({top:0, behavior:"smooth"});
}

    if(f.area && f.area!=="-") meta.push(`<span>📍 ${f.area}</span>`);
    if(f.menu) meta.push(`<span>${f.menu}</span>`);
    if(f.hour) meta.push(`<span>${clockSvg} ${f.hour}</span>`);
    h += `<div class="r-meta">${meta.join("")}</div></div></div>`;
    if(f.map) h += `<div class="r-foot"><span></span><a class="maplink" style="margin-top:0" href="${mapUrl(f.map)}" target="_blank" rel="noopener">지도 ›</a></div>`;
    h += '</div>';
  });
  h += "</div>";
  document.getElementById("food-body").innerHTML = h;
})();

/* ---------- BOOK ---------- */
(function(){
  let h = "";
  BOOK.forEach(g=>{
    h += `<div class="group"><div class="group-h">${g.cat} <span class="cnt">${g.items.length}곳</span></div>`;
    g.items.forEach(it=>{
      h += '<div class="row"><div class="r-top">';
      h += `<div class="r-name">${it.name}</div>${resvBadge(it.resv)}</div>`;
      let meta = [];
      meta.push(`<span>🗓️ ${it.date}</span>`);
      if(it.time) meta.push(`<span>⏰ ${it.time}</span>`);
      if(it.price) meta.push(`<span>💷 ${it.price}</span>`);
      if(it.hour) meta.push(`<span>${clockSvg} ${it.hour}</span>`);
      h += `<div class="r-meta">${meta.join("")}</div>`;
      if(it.via || it.map){
        h += '<div class="r-foot">';
        h += it.via ? `<span class="pill">${it.via}</span>` : "<span></span>";
        if(it.map) h += `<a class="maplink" style="margin-top:0" href="${mapUrl(it.map)}" target="_blank" rel="noopener">지도 ›</a>`;
        h += '</div>';
      }
      h += '</div>';
    });
    h += "</div>";
  });
  document.getElementById("book-body").innerHTML = h;
})();

/* ---------- PREP (checklist, persisted) ---------- */
const STORE_KEY = "london2026_checks";
function loadChecks(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY)||"{}"); }catch(e){ return {}; } }
function saveChecks(o){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(o)); }catch(e){} }
let checks = loadChecks();

function renderPrep(){
  const body = document.getElementById("prep-body");
  let h = "";
  PREP.forEach((sec,si)=>{
    let all=0, done=0;
    sec.groups.forEach(g=>g.items.forEach(it=>{ all++; if(checks[sec.title+"|"+it]) done++; }));
    const open = si===0 ? " open" : "";
    h += `<div class="acc${open}" data-sec="${si}">`;
    h += `<div class="acc-h"><div class="lt">${sec.icon} ${sec.title}</div>`;
    h += `<div style="display:flex;align-items:center;gap:10px"><span class="prog">${done}/${all}</span><span class="arr">›</span></div></div>`;
    h += '<div class="acc-b">';
    sec.groups.forEach(g=>{
      g.items.forEach(it=>{
        const key = sec.title+"|"+it;
        const ck = checks[key] ? "checked" : "";
        h += `<label class="chk"><input type="checkbox" data-key="${key.replace(/"/g,'&quot;')}" ${ck}><span>${it}</span></label>`;
      });
    });
    h += '</div></div>';
  });
  body.innerHTML = h;
  body.querySelectorAll(".acc-h").forEach(hh=>{
    hh.onclick = (e)=>{ if(e.target.tagName==="INPUT") return; hh.parentElement.classList.toggle("open"); };
  });
  body.querySelectorAll('input[type="checkbox"]').forEach(cb=>{
    cb.onchange = ()=>{
      checks[cb.dataset.key] = cb.checked;
      saveChecks(checks);
      const acc = cb.closest(".acc"); const si = +acc.dataset.sec;
      let all=0, done=0;
      PREP[si].groups.forEach(g=>g.items.forEach(it=>{ all++; if(checks[PREP[si].title+"|"+it]) done++; }));
      acc.querySelector(".prog").textContent = done+"/"+all;
    };
  });
}
renderPrep();
document.getElementById("resetChk").onclick = ()=>{
  if(confirm("체크 항목을 전부 초기화할까요?")){ checks={}; saveChecks(checks); renderPrep(); }
};

/* ---------- NAV ---------- */
const views = {plan:document.getElementById("view-plan"), food:document.getElementById("view-food"), book:document.getElementById("view-book"), prep:document.getElementById("view-prep")};
document.querySelectorAll("#nav button").forEach(b=>{
  b.onclick = ()=>{
    const v = b.dataset.view;
    document.querySelectorAll("#nav button").forEach(x=>x.classList.toggle("active", x===b));
    Object.entries(views).forEach(([k,el])=>el.classList.toggle("active", k===v));
    window.scrollTo({top:0});
  };
});
</script>
</body>
